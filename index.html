'cv-u5': '\n<div class="note-header-block" style="border-left-color:#60cc80;">\n  <div class="nh-tag" style="color:#3a9a55;">CIVICS ／ 第五章 ／ 翰林版 ／ 段考完整版</div>\n  <h1 style="color:#60cc80;">公共意見與媒體</h1>\n  <div class="nh-sub">5-1 媒體對公共意見的影響\u3000・\u30005-2 民眾的媒體近用權\u3000・\u30005-3 科技發展與公共意見</div>\n</div>\n\n\n\n<div class="cv-tab-bar">\n  <div class="cv-tab active" onclick="cvTab(0,this)">5-1</div>\n  <div class="cv-tab" onclick="cvTab(1,this)">5-2</div>\n  <div class="cv-tab" onclick="cvTab(2,this)">5-3</div>\n  <div class="cv-tab" onclick="cvTab(3,this)">⚡考點</div>\n</div>\n\n<!-- 5-1 -->\n<div class="cv-sec active" id="cv0">\n  <div class="sec-title"><span class="num">概念</span><h2>公共意見（Public Opinion）</h2></div>\n  <div class="card hl">\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div>定義：社會上一群人對<em>某項公共事務</em>所表達的意見或立場，也叫「<em>民意</em>」或「<em>輿論</em>」</div></div>\n      <div class="pt"><div class="dot"></div><div>與民主政治密不可分，民眾透過各種管道表達意見，進而<em>影響政策</em></div></div>\n    </div>\n    <div class="cv-sub">傳統表達管道（4個必背）</div>\n    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;">\n      <span style="font-size:12px;background:rgba(240,192,64,.12);color:var(--gold);border:1px solid rgba(240,192,64,.3);padding:2px 10px;border-radius:20px;">民調</span>\n      <span style="font-size:12px;background:rgba(240,192,64,.12);color:var(--gold);border:1px solid rgba(240,192,64,.3);padding:2px 10px;border-radius:20px;">意見領袖／專家學者</span>\n      <span style="font-size:12px;background:rgba(240,192,64,.12);color:var(--gold);border:1px solid rgba(240,192,64,.3);padding:2px 10px;border-radius:20px;">公聽會／聽證會</span>\n      <span style="font-size:12px;background:rgba(240,192,64,.12);color:var(--gold);border:1px solid rgba(240,192,64,.3);padding:2px 10px;border-radius:20px;">社會運動</span>\n    </div>\n  </div>\n  <div class="sec-title"><span class="num">一</span><h2>媒體與公共意見的關係</h2></div>\n  <div class="card hl">\n    <div class="cv-sub">（一）媒體帶動公共議題的傳播</div>\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div>媒體報導 → 民眾知悉 → 社會對話 → <em>公共意見形成</em></div></div>\n      <div class="pt"><div class="dot c"></div><div>有助了解公共事務、<b>促進政治參與</b>、強化民意對政府監督</div></div>\n    </div>\n    <div class="cv-sub">（二）新聞自由與第四權</div>\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div>媒體須查證事實、傳遞資訊、守望社會 → <em>不受當權者控制</em></div></div>\n      <div class="pt"><div class="dot"></div><div>行政、立法、司法三權之後，媒體被稱為「<em>第四權</em>」</div></div>\n    </div>\n    <div class="cv-eg"><span class="cv-eg-lbl">法律</span>憲法第11條：人民有言論、講學、著作及出版之自由 → 保障媒體採訪、報導、出版等新聞自由</div>\n  </div>\n  <div class="sec-title"><span class="num">二</span><h2>4種媒體所有權</h2></div>\n  <div class="card hl">\n    <table>\n      <tr><th>類型</th><th>所有權</th><th>特色</th><th>例子</th></tr>\n      <tr><td class="g">公共媒體</td><td>全體民眾</td><td>不受商業/政治干預，<em>較中立</em></td><td>公視、客家台</td></tr>\n      <tr><td class="r">商業媒體</td><td>私人企業</td><td>目的獲利→易追求點閱率；可能<em>媒體集團化</em></td><td>TVBS、三立</td></tr>\n      <tr><td class="c">獨立媒體</td><td>民間獨立</td><td><em>關注弱勢議題</em>，多以網站形式</td><td>報導者</td></tr>\n      <tr><td>自媒體</td><td>個人或團體</td><td>傳播快速、即時；藉社群媒體表達公共意見</td><td>YouTube頻道</td></tr>\n    </table>\n    <div class="tip">⚠️ 媒體集團化：多平台整合 → 通常由財團出資 → 可能<em>壟斷議題</em>、閱聽人難接觸多元訊息</div>\n  </div>\n  <div class="sec-title"><span class="num">三</span><h2>媒體產製對公共意見的影響</h2></div>\n  <div class="card hl">\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div>對新聞資訊進行捨取的人 = <em>守門人（gate-keeper）</em></div></div>\n      <div class="pt"><div class="dot c"></div><div>記者為避免退稿，配合媒體立場 = 「<em>新聞室的社會控制</em>」</div></div>\n    </div>\n    <div class="cv-eg"><span class="cv-eg-lbl">例</span>同一場勞工抗爭：A台「勞工爭取大眾權利」、B台「勞工無秩序堵塞交通」→ 閱聽人形成截然不同的印象</div>\n  </div>\n  <div class="sec-title"><span class="num">四</span><h2>媒體再現對公共意見的影響</h2></div>\n  <div class="card hl">\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div><em>媒體再現</em>：媒體加工後的「二度呈現」，非第一手資料</div></div>\n      <div class="pt"><div class="dot r"></div><div>追求點閱率 → 報導血腥、煽情議題 → 公共議題版面被<em>排擠</em></div></div>\n      <div class="pt"><div class="dot r"></div><div><em>帶風向</em>：刻意錯誤報導 → 引發網路肉搜或圍剿</div></div>\n      <div class="pt"><div class="dot c"></div><div><b>過濾泡泡</b>：演算法依偏好篩選 → <em>同溫層</em> → 認知單一化</div></div>\n      <div class="pt"><div class="dot"></div><div><em>置入性行銷</em>：廣告商或政府付費將產品化為媒體內容 → 侵蝕第四權獨立性</div></div>\n    </div>\n    <div class="cv-eg"><span class="cv-eg-lbl">法律</span>2015年廣電三法：<em>新聞與兒童節目不得置入性行銷</em></div>\n    <div class="cv-sub">假訊息 vs 假新聞</div>\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div><em>假訊息</em>：任何人捏造的不實內容</div></div>\n      <div class="pt"><div class="dot"></div><div><em>假新聞</em>：具查證功能的媒體<b>刻意</b>編造虛假事件（差別在「媒體刻意」）</div></div>\n    </div>\n  </div>\n  <div class="sec-title"><span class="num">五</span><h2>媒體再現的不平等（3類）</h2></div>\n  <div class="card hl">\n    <table>\n      <tr><th>對象</th><th>問題</th><th>例子</th></tr>\n      <tr><td class="g">特定族群</td><td>刻意簡化呈現 → 產生歧視認知</td><td>Pangoyod穿傳統服飾領獎，媒體以「不雅」標題報導</td></tr>\n      <tr><td class="c">身心障礙者</td><td>將案件歸因「特殊性」→ 民眾誤解法律公平正義</td><td>「因思覺失調可免除刑責」→ 貼標籤</td></tr>\n      <tr><td class="r">性別與性傾向</td><td>特別聚焦當事人性別 → 加劇刻板印象</td><td>口罩報導「婆婆媽媽排隊」</td></tr>\n    </table>\n  </div>\n</div>\n\n<!-- 5-2 -->\n<div class="cv-sec" id="cv1">\n  <div class="sec-title"><span class="num">概念</span><h2>媒體近用權</h2></div>\n  <div class="card hl">\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div><em>媒體近用權</em>：人民得依一定條件，要求媒體提供版面或時間，讓其<em>行使表達意見之權利</em></div></div>\n    </div>\n    <div class="cv-eg"><span class="cv-eg-lbl">釋憲</span>1994年釋字第<em>364</em>號：確立「接近使用傳播媒體權」。國家應對電波頻率公平分配，尊重人民接近使用傳播媒體之權利</div>\n  </div>\n  <div class="sec-title"><span class="num">一</span><h2>接近權 vs 使用權</h2></div>\n  <div class="card hl">\n    <div class="cmp-row">\n      <div class="cmp-g">\n        <span class="cmp-tag">被動・有限度</span>\n        <div class="cmp-title">接近權</div>\n        <div class="cmp-body">人民有權在媒體上發表言論，回應媒體報導<br><br>・<em>更正權</em>：媒體不實報導 → 可要求訂正<br>・<em>答辯權</em>：媒體報導時 → 可要求說明或解釋</div>\n      </div>\n      <div class="cmp-c">\n        <span class="cmp-tag">主動・積極</span>\n        <div class="cmp-title">使用權</div>\n        <div class="cmp-body">人民可自行提供或製作節目，用原聲原音在大眾媒體發言，不被剪裁<br><br>包含：要求播送、自行經營媒體、申請頻道（<em>使用頻道權</em>）</div>\n      </div>\n    </div>\n    <div class="tip">⚠️ 核心差異：接近權 = <em>事後被動回應</em>｜使用權 = <em>主動出擊</em><br>⚠️ NCC規定自製比例 = <em>使用權</em>，不是接近權！</div>\n  </div>\n  <div class="cv-eg"><span class="cv-eg-lbl">例</span>香蕉假新聞（2018）：蕉農行使<em>更正權</em>要求刊謠、行使<em>答辯權</em>上電視說明、行使<em>使用權</em>自拍澄清影片要求完整播出</div>\n  <div class="sec-title"><span class="num">二</span><h2>媒體近用的不平等</h2></div>\n  <div class="card hl">\n    <div class="cv-sub">（一）原住民族</div>\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div>主流媒體報導原住民篇幅偏少，多聚焦<em>抗爭衝突畫面</em></div></div>\n      <div class="pt"><div class="dot c"></div><div>政府設立<em>原住民族電視台（原視）</em>→ 增加發聲管道、破除刻板印象</div></div>\n      <div class="pt"><div class="dot c"></div><div>2010年原視創設 <em>WATTA</em>（Web Access To Tribal Actions）新聞平臺</div></div>\n    </div>\n    <div class="cv-sub">（二）新住民</div>\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div>東南亞籍新住民為<em>我國第五大族群</em>，傳播環境以華語為主 → 缺乏資訊管道</div></div>\n      <div class="pt"><div class="dot c"></div><div>改善：<em>四方報</em>（多國語言民營報紙）；移民署「<em>新住民全球新聞網</em>」（中英越印泰語）</div></div>\n    </div>\n  </div>\n  <div class="sec-title"><span class="num">三</span><h2>如何監督媒體？</h2></div>\n  <div class="card hl">\n    <table>\n      <tr><th>監督方式</th><th>代表機構</th><th>成立年份</th><th>特色</th></tr>\n      <tr><td class="g">政府監督</td><td>NCC（國家通訊傳播委員會）</td><td class="g">2006年</td><td>獨立機關，監理廣電傳播事業</td></tr>\n      <tr><td class="c">人民監督</td><td>台灣媒體觀察教育基金會</td><td class="c">1999年</td><td>第一個媒體監督民間團體，推廣媒體素養</td></tr>\n      <tr><td>媒體自律</td><td>媒體自行建立自律機制</td><td>—</td><td>確保準確性與公正性</td></tr>\n    </table>\n    <div class="tip">⚠️ 背景：1988解除報禁 → 1994開放有線電視 → 媒體亂象 → 人民監督出現<br>⚠️ 要發揮第四權 = <em>政府 ＋ 人民 ＋ 媒體自律</em>三方共同監督</div>\n  </div>\n</div>\n\n<!-- 5-3 -->\n<div class="cv-sec" id="cv2">\n  <div class="sec-title"><span class="num">背景</span><h2>社群媒體的誕生</h2></div>\n  <div class="card hl">\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div>1990年起，美國國會開放網際網路 → 民用普及 → <em>世界地球村</em>誕生</div></div>\n      <div class="pt"><div class="dot c"></div><div>社群網路讓閱聽人從「<em>被動接受</em>」→「<em>主動傳播</em>」資訊</div></div>\n    </div>\n    <div class="cv-sub">社群媒體三大特性</div>\n    <div class="feat-row">\n      <div class="feat-card"><div class="feat-title">互動性</div><div class="feat-body">閱聽人可與傳播者進行雙向或多向的互動溝通</div></div>\n      <div class="feat-card"><div class="feat-title">便利性</div><div class="feat-body">透過搜尋引擎或線上資料庫，便能取得想要的資訊</div></div>\n      <div class="feat-card"><div class="feat-title">即時性</div><div class="feat-body">能迅速蒐集資訊，透過直播或轉傳即時傳播</div></div>\n    </div>\n  </div>\n  <div class="sec-title"><span class="num">一</span><h2>科技發展提升公共生活的參與</h2></div>\n  <div class="card hl">\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div>網路科技讓民眾即時傳遞、互動與討論 → 降低<em>政治冷漠</em>感，提升參與機會、意願和能力</div></div>\n      <div class="pt"><div class="dot c"></div><div>許多社會運動透過網路發起串連，有助公共意見的<em>討論與運動的參與</em></div></div>\n    </div>\n    <div class="cv-eg"><span class="cv-eg-lbl">例</span>2023年臺南市女童遭汽車撞死 → 民眾自發網路串聯，舉辦「<em>還路於民</em>」大遊行</div>\n    <div class="cv-eg"><span class="cv-eg-lbl">例</span>2020年「<em>Taiwan can Help</em>」：社群媒體號召 → 群眾募資 → 紐約時報全版廣告 → 增加台灣能見度</div>\n    <div class="tip">⚠️ 鍵盤參與困境：「<em>萬人響應、一人到場</em>」→ 公民應進一步<em>親身參與社會辯論</em></div>\n  </div>\n  <div class="sec-title"><span class="num">二</span><h2>數位落差（Digital Divide）</h2></div>\n  <div class="card hl">\n    <div class="pts">\n      <div class="pt"><div class="dot"></div><div><em>數位機會</em>：個人具有資訊科技使用能力，並透過科技取得進步的可能性</div></div>\n      <div class="pt"><div class="dot r"></div><div><em>數位落差</em>：民眾因性別、經濟、教育與居住區域等因素不同，在數位工具的<em>物質、動機和技能</em>上有差異</div></div>\n    </div>\n    <div class="cv-sub">造成數位落差的三大原因</div>\n    <div class="div-row">\n      <div class="div-r"><div class="div-dtitle">① 物質上的落差</div><div class="div-dbody">是否擁有電腦、手機、網路<br><br>偏遠山區網路覆蓋率低</div></div>\n      <div class="div-y"><div class="div-dtitle">② 技能上的落差</div><div class="div-dbody">操作資訊科技能力不同<br><br>教育部推「邁向數位平權推動計畫」；成立<em>DOC（數位機會中心）</em>協助偏鄉</div></div>\n      <div class="div-c"><div class="div-dtitle">③ 動機上的落差</div><div class="div-dbody">對數位科技缺乏認知，或擔心資訊洩漏<br><br>→ 不願學新科技，偏好傳統媒介</div></div>\n    </div>\n  </div>\n  <div class="sec-title"><span class="num">三</span><h2>數位落差對公共參與的影響</h2></div>\n  <div class="card hl">\n    <div class="pts">\n      <div class="pt"><div class="dot r"></div><div>弱勢群體意見難以透過數位管道表達 → 政府制定政策時<em>忽略弱勢利益</em></div></div>\n      <div class="pt"><div class="dot r"></div><div>網路民調排除不上網民眾 → 媒體呈現的公共意見可能只是「<em>冰山一角</em>」</div></div>\n      <div class="pt"><div class="dot r"></div><div>同溫層效應 → 只看到「自己想看的」資訊 → <em>限縮資訊廣泛接收</em></div></div>\n    </div>\n    <div class="cv-eg"><span class="cv-eg-lbl">例</span>臺北市 i-Voting（2018年停止發送元宵節小提燈案）：全體市民267.4萬，僅1.4萬人參與 → 網路投票<em>排擠不使用網路的民眾</em></div>\n    <div class="tip">⚠️ 科技能促進公共參與，但也可能<em>製造新的不平等</em></div>\n  </div>\n</div>\n\n<!-- 考點 -->\n<div class="cv-sec" id="cv3">\n  <div class="sec-title"><span class="num">5-1</span><h2>必背清單</h2></div>\n  <div class="checklist">\n    <div class="pts">\n      <div class="pt"><div class="dot r"></div><div>公共意見 = 民意 = 輿論；4種表達管道要記</div></div>\n      <div class="pt"><div class="dot r"></div><div>媒體為「<em>第四權</em>」→ 行政、立法、司法之外</div></div>\n      <div class="pt"><div class="dot r"></div><div>4種媒體：<em>公共（公視）、商業（TVBS）、獨立（報導者）、自媒體</em></div></div>\n      <div class="pt"><div class="dot r"></div><div><em>守門人（gate-keeper）</em>= 決定新聞資訊捨取的人</div></div>\n      <div class="pt"><div class="dot r"></div><div><em>新聞室的社會控制</em> = 記者配合媒體立場以避免退稿</div></div>\n      <div class="pt"><div class="dot r"></div><div><em>媒體再現</em>= 媒體加工後的二度呈現，非第一手資料</div></div>\n      <div class="pt"><div class="dot r"></div><div>過濾泡泡 → 同溫層 → 認知單一化、意識型態化</div></div>\n      <div class="pt"><div class="dot r"></div><div>置入性行銷：2015廣電三法，<em>新聞與兒童節目不得置入</em></div></div>\n      <div class="pt"><div class="dot r"></div><div>假訊息 ≠ 假新聞（假新聞是有查證功能的媒體<em>刻意</em>捏造）</div></div>\n      <div class="pt"><div class="dot r"></div><div>媒體再現不平等三類：<em>族群、身心障礙者、性別與性傾向</em></div></div>\n    </div>\n  </div>\n  <div class="sec-title"><span class="num">5-2</span><h2>必背清單</h2></div>\n  <div class="checklist">\n    <div class="pts">\n      <div class="pt"><div class="dot r"></div><div>媒體近用權 = 要求媒體提供版面/時間，以<em>表達意見</em>的權利</div></div>\n      <div class="pt"><div class="dot r"></div><div>釋字第<em>364</em>號（1994）= 確立「接近使用傳播媒體權」</div></div>\n      <div class="pt"><div class="dot r"></div><div><em>接近權</em>（被動、有限度）= 更正權 ＋ 答辯權</div></div>\n      <div class="pt"><div class="dot r"></div><div><em>使用權</em>（主動、積極）= 自製節目 ＋ 要求播出 ＋ 使用頻道權</div></div>\n      <div class="pt"><div class="dot r"></div><div>考題陷阱：NCC規定自製比例 = <em>使用權</em>，不是接近權！</div></div>\n      <div class="pt"><div class="dot r"></div><div>新住民 = 第五大族群；四方報（多語民營）；新住民全球新聞網（移民署）</div></div>\n      <div class="pt"><div class="dot r"></div><div>原視 = 原住民族電視台；<em>WATTA</em> = 原視2010年創設的網路新聞平台</div></div>\n      <div class="pt"><div class="dot r"></div><div>NCC = 國家通訊傳播委員會，<em>2006年</em>成立，獨立機關</div></div>\n      <div class="pt"><div class="dot r"></div><div>台灣媒體觀察教育基金會 = <em>1999年</em>，第一個人民媒體監督團體</div></div>\n      <div class="pt"><div class="dot r"></div><div>1988解除報禁 → 1994開放有線電視 → 媒體亂象 → 人民監督出現</div></div>\n    </div>\n  </div>\n  <div class="sec-title"><span class="num">5-3</span><h2>必背清單</h2></div>\n  <div class="checklist">\n    <div class="pts">\n      <div class="pt"><div class="dot r"></div><div>社群媒體三特性：<em>互動性、便利性、即時性</em></div></div>\n      <div class="pt"><div class="dot r"></div><div>1990年美國國會開放網際網路 → 新興媒體誕生</div></div>\n      <div class="pt"><div class="dot r"></div><div>科技讓閱聽人從「被動接受」→「<em>主動傳播</em>」</div></div>\n      <div class="pt"><div class="dot r"></div><div>鍵盤參與困境：「<em>萬人響應、一人到場</em>」</div></div>\n      <div class="pt"><div class="dot r"></div><div>數位落差三原因：<em>物質（有無設備）、技能（會不會用）、動機（想不想用）</em></div></div>\n      <div class="pt"><div class="dot r"></div><div>教育部「邁向數位平權推動計畫」；<em>DOC（數位機會中心）</em>協助偏鄉</div></div>\n      <div class="pt"><div class="dot r"></div><div>i-Voting案 → 網路投票排擠不上網民眾 → 公共意見只是<em>冰山一角</em></div></div>\n      <div class="pt"><div class="dot r"></div><div>同溫層效應 → 資訊接收限縮 → 影響公共意見廣度</div></div>\n      <div class="pt"><div class="dot r"></div><div>Taiwan can Help（2020）→ 社群號召 → 群眾募資 → 紐時廣告</div></div>\n    </div>\n  </div>\n  <hr>\n  <div class="sec-title"><span class="num">超考</span><h2>最容易混淆的題型</h2></div>\n  <div class="card hl">\n    <table>\n      <tr><th>情境</th><th>答案</th><th>理由</th></tr>\n      <tr><td>NCC規定電視台播出自製節目比例</td><td class="g">使用權</td><td>主動規定播出內容，不是事後回應</td></tr>\n      <tr><td>當事人要求媒體更正不實報導</td><td class="c">更正權（接近權）</td><td>事後被動，針對已發出的報導</td></tr>\n      <tr><td>蕉農自拍影片要求電視完整播出</td><td class="g">使用權</td><td>主動提供內容、要求播送</td></tr>\n      <tr><td>商業媒體大篇幅報導命案，忽略其他議題</td><td class="r">議題排擠效應</td><td>追求點閱率 → 公共議題版面被排擠</td></tr>\n      <tr><td>媒體接受政府付費，在新聞中宣傳政策</td><td class="r">置入性行銷</td><td>政府付費讓媒體內容變廣告</td></tr>\n      <tr><td>假訊息 vs 假新聞</td><td>假新聞 = 媒體刻意</td><td>假訊息是任何人捏造；假新聞限定「有查證功能的媒體」刻意造假</td></tr>\n    </table>\n  </div>\n</div>\n\n',

/* ════════ 數學：直角三角形定義 ════════ */
'm-t1': '\n<div class="note-header-block" style="border-left-color:#9b8fff;">\n  <div class="nh-tag" style="color:#6a58e0;">MATH ／ 三角函數 ／ 龍騰版</div>\n  <h1 style="color:#9b8fff;">直角三角形三角比</h1>\n  <div class="nh-sub">基本定義・大小比較・角平分線・中線題型</div>\n</div>\n\n\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">定義</span><h2 style="color:#9b8fff;">基本定義</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="pts">\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>在直角三角形中，設斜邊為 r，對邊為 y，鄰邊為 x：</div></div>\n  </div>\n  <div class="math-block">\n    <span class="math-hi">sin θ = 對邊/斜邊 = y/r</span>（正弦，上下）<br>\n    <span class="math-hi">cos θ = 鄰邊/斜邊 = x/r</span>（餘弦，水平）<br>\n    <span class="math-hi">tan θ = 對邊/鄰邊 = y/x</span>（正切，圓外）\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">比較</span><h2 style="color:#9b8fff;">sin vs cos vs tan 大小比較（0°&lt;θ&lt;90°）</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-block">\n    θ &lt; 45°：<span class="math-hi">sinθ &lt; cosθ</span>（sin較小）<br>\n    θ = 45°：<span class="math-hi">sinθ = cosθ</span><br>\n    θ &gt; 45°：<span class="math-hi">sinθ &gt; cosθ</span>\n  </div>\n  <div class="pts" style="margin-top:8px;">\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>0° &lt; θ ≤ 38°10\'：tan 夾在 sin 和 cos 之間</div></div>\n    <div class="pt"><div class="dot" style="background:var(--red);"></div><div>38°10\' &lt; θ &lt; 45°：<span class="math-hi2">tanθ 最大</span></div></div>\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>45° &lt; θ &lt; 90°：<span class="math-hi">tanθ &gt; sinθ &gt; cosθ</span></div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">題型</span><h2 style="color:#9b8fff;">角平分線 + 差角 題型技巧</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-warn">⚠️ 遇到角平分線，角 A = 2θ，不要直接用 A，要先用 tan2θ 求出邊長！</div>\n  <div class="pts" style="margin-top:8px;">\n    <div class="pt"><div class="dot" style="background:var(--cyan);"></div><div><span class="math-hi3">解題流程：</span></div></div>\n  </div>\n  <div class="math-block">\n    1. 用 tanθ 設出邊長（設小三角形的邊）<br>\n    2. 用 tan(2θ) = 2tanθ/(1-tan²θ) 算出整個大角的 tan<br>\n    3. 再從大直角三角形求 sinA、cosA\n  </div>\n  <div class="pts" style="margin-top:8px;">\n    <div class="pt"><div class="dot" style="background:var(--cyan);"></div><div><span class="math-hi3">差角技巧：</span>θ = α - β 時，用 tan(α-β) 公式拆開<br>例：tan(∠DAB) = tan(∠BAC - ∠DAC)</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">題型</span><h2 style="color:#9b8fff;">中線題型技巧</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="pts">\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>D 為 BC 中點 → BD = DC = BC/2</div></div>\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>求 AD = √(AC² + DC²)（若 ∠ACD = 90°）</div></div>\n    <div class="pt"><div class="dot" style="background:var(--red);"></div><div>θ 是哪個角要<span class="math-hi2">看清楚圖</span>，別假設 θ 就是整個 ∠A</div></div>\n  </div>\n</div>\n',

/* ════════ 數學：廣義角 ════════ */
'm-t2': '\n<div class="note-header-block" style="border-left-color:#9b8fff;">\n  <div class="nh-tag" style="color:#6a58e0;">MATH ／ 三角函數 ／ 龍騰版</div>\n  <h1 style="color:#9b8fff;">廣義角與三角函數</h1>\n  <div class="nh-sub">標準位置角・象限角・θ/n象限題型・廣義角三角函數定義・參考角</div>\n</div>\n\n\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">定義</span><h2 style="color:#9b8fff;">標準位置角</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="pts">\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>以 x 軸正方向為始邊，逆時針 → <span class="math-hi">正角</span>，順時針 → <span class="math-hi2">負角</span></div></div>\n    <div class="pt"><div class="dot" style="background:var(--cyan);"></div><div><span class="math-hi3">同界角：</span>θ + 360°×k（k∈Z）</div></div>\n    <div class="pt"><div class="dot" style="background:var(--cyan);"></div><div>判斷兩角是否同界：α - β = 360°×k</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">象限</span><h2 style="color:#9b8fff;">象限角（廣義）</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-block">\n    第一象限：0° + 360°k &lt; θ &lt; 90° + 360°k<br>\n    第二象限：90° + 360°k &lt; θ &lt; 180° + 360°k<br>\n    第三象限：180° + 360°k &lt; θ &lt; 270° + 360°k<br>\n    第四象限：270° + 360°k &lt; θ &lt; 360° + 360°k<br><br>\n    軸上角（非象限角）：θ = 90°k\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">⭐題型</span><h2 style="color:#9b8fff;">θ/n 的象限題型（超頻考點！）</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-warn">⚠️ 這是超頻考點！若 θ 為第 X 象限角，求 θ/3 為第幾象限</div>\n  <div class="math-block">\n    1. 先寫出 θ 的不等式（含 k）<br>\n    2. 三邊除以 3<br>\n    3. 代 k = 0, 1, 2 各看落哪個象限<br>\n    4. 三次循環後重複 → 最多三種答案\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">定義</span><h2 style="color:#9b8fff;">廣義角三角函數定義</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="pts">\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>單位圓上 P(x,y)，r = OP 長度：</div></div>\n  </div>\n  <div class="math-block">\n    <span class="math-hi">sin θ = y/r，cos θ = x/r，tan θ = y/x</span><br><br>\n    值域：-1 ≤ sinθ ≤ 1，-1 ≤ cosθ ≤ 1，tanθ ∈ R\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">流程</span><h2 style="color:#9b8fff;">參考角求值流程</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-block">\n    1. 先把角化到 0°~360°（加減 360°）<br>\n    2. 判斷在哪個象限 → 確定正負<br>\n    3. 求<span class="math-hi3">參考角</span>（與 x 軸夾的銳角）<br>\n    4. 用參考角查特殊角值，加上正負號\n  </div>\n  <div class="math-block" style="border-left-color:var(--cyan);">\n    sin 160° = sin 20°（二象限 sin 正，參考角 20°）<br>\n    cos(-105°) = -cos 75°（三象限 cos 負，參考角 75°）<br>\n    tan 2010° → 2010 = 5×360 + 210 → tan 210° = tan 30° = 1/√3\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">題型</span><h2 style="color:#9b8fff;">值域最大值題型</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="pts">\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>cos⁶θ + cos³⁶⁰θ + cos³⁰⁰θ = 3 這類題：</div></div>\n    <div class="pt"><div class="dot" style="background:var(--red);"></div><div><span class="math-hi">cos 的最大值是 1</span>，三個都要等於 1 才能讓和為 3<br>→ cosθ = 1 → θ = 0°, 360°</div></div>\n  </div>\n</div>\n\n<hr>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">速查</span><h2 style="color:#9b8fff;">象限正負號速查</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <table>\n    <tr><th>象限</th><th>sin</th><th>cos</th><th>tan</th></tr>\n    <tr><td>一（0°~90°）</td><td class="g">+</td><td class="g">+</td><td class="g">+</td></tr>\n    <tr><td>二（90°~180°）</td><td class="g">+</td><td class="r">-</td><td class="r">-</td></tr>\n    <tr><td>三（180°~270°）</td><td class="r">-</td><td class="r">-</td><td class="g">+</td></tr>\n    <tr><td>四（270°~360°）</td><td class="r">-</td><td class="g">+</td><td class="r">-</td></tr>\n  </table>\n  <div style="padding:8px 0 0;font-size:12.5px;color:var(--muted);">記法：<em>全、正弦、正切、餘弦</em> → 一二三四象限正的那個</div>\n</div>\n',

/* ════════ 數學：三角比性質（公式庫）════════ */
'm-t3': '\n<div class="note-header-block" style="border-left-color:#9b8fff;">\n  <div class="nh-tag" style="color:#6a58e0;">MATH ／ 三角函數 ／ 龍騰版</div>\n  <h1 style="color:#9b8fff;">三角比性質・公式庫</h1>\n  <div class="nh-sub">基本關係・恆等式・和差角・倍角・半角・x/y軸轉化・正弦/餘弦定理</div>\n</div>\n\n\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">基本</span><h2 style="color:#9b8fff;">基本關係</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="fml-group">\n    <div class="fml-label">平方關係</div>\n    <div class="math-block"><span class="math-hi">sin²θ + cos²θ = 1</span></div>\n  </div>\n  <div class="fml-group">\n    <div class="fml-label">商數關係</div>\n    <div class="math-block">\n      <span class="math-hi">tan θ = sin θ / cos θ</span><br>\n      <span class="math-hi">cos²θ = 1 / (1 + tan²θ)</span>\n    </div>\n  </div>\n  <div class="fml-group">\n    <div class="fml-label">互餘</div>\n    <div class="math-block">\n      <span class="math-hi">sin(90°-θ) = cos θ</span><br>\n      <span class="math-hi">cos(90°-θ) = sin θ</span>\n    </div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">技巧</span><h2 style="color:#9b8fff;">恆等式技巧</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="fml-group">\n    <div class="fml-label">展開平方</div>\n    <div class="math-block">\n      <span class="math-hi">(sinθ+cosθ)²</span> = 1 + 2sinθcosθ<br>\n      <span class="math-hi">(sinθ-cosθ)²</span> = 1 - 2sinθcosθ\n    </div>\n  </div>\n  <div class="fml-group">\n    <div class="fml-label">tan轉化技巧</div>\n    <div class="math-block">\n      A cos²θ + B cosθ sinθ + C sin²θ<br>\n      = <span class="math-hi3">(A + B tanθ + C tan²θ) / (1 + tan²θ)</span><br><br>\n      <span class="math-hi4">用途：把混合式全部換成 tanθ 再解方程</span>\n    </div>\n  </div>\n  <div class="fml-group">\n    <div class="fml-label">tanθ + 1/tanθ</div>\n    <div class="math-block">tanθ + 1/tanθ = <span class="math-hi">1 / (sinθ cosθ)</span></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">公式</span><h2 style="color:#9b8fff;">和差角公式</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="fml-group">\n    <div class="fml-label">sin</div>\n    <div class="math-block">\n      <span class="math-hi3">sin(A+B)</span> = sinA cosB + cosA sinB<br>\n      <span class="math-hi3">sin(A-B)</span> = sinA cosB - cosA sinB\n    </div>\n  </div>\n  <div class="fml-group">\n    <div class="fml-label">cos</div>\n    <div class="math-block">\n      <span class="math-hi3">cos(A+B)</span> = cosA cosB - sinA sinB<br>\n      <span class="math-hi3">cos(A-B)</span> = cosA cosB + sinA sinB\n    </div>\n  </div>\n  <div class="fml-group">\n    <div class="fml-label">tan</div>\n    <div class="math-block">\n      <span class="math-hi3">tan(A±B)</span> = (tanA ± tanB) / (1 ∓ tanA·tanB)\n    </div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">公式</span><h2 style="color:#9b8fff;">倍角公式</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-block">\n    <span class="math-hi2">sin(2θ)</span> = 2 sinθ cosθ<br><br>\n    <span class="math-hi2">cos(2θ)</span> = cos²θ - sin²θ<br>\n    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= 2cos²θ - 1<br>\n    &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;= 1 - 2sin²θ<br><br>\n    <span class="math-hi2">tan(2θ)</span> = 2tanθ / (1 - tan²θ)\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">公式</span><h2 style="color:#9b8fff;">半角公式（進階）</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-block">\n    <span class="math-hi4">sin(θ/2)</span> = ±√((1-cosθ)/2)<br>\n    <span class="math-hi4">cos(θ/2)</span> = ±√((1+cosθ)/2)<br>\n    <span class="math-hi4">tan(θ/2)</span> = sinθ/(1+cosθ) = (1-cosθ)/sinθ\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">公式</span><h2 style="color:#9b8fff;">x軸/y軸轉化公式</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="fml-group">\n    <div class="fml-label">x軸轉化（180°, 360°）→ 函數名稱不變</div>\n    <div class="math-block">\n      sin(180°-θ) = <span class="math-hi">sinθ</span> &nbsp;&nbsp; sin(180°+θ) = <span class="math-hi2">-sinθ</span><br>\n      cos(180°-θ) = <span class="math-hi2">-cosθ</span> &nbsp; cos(180°+θ) = <span class="math-hi2">-cosθ</span><br>\n      sin(360°-θ) = <span class="math-hi2">-sinθ</span> &nbsp; sin(360°+θ) = <span class="math-hi">sinθ</span><br>\n      cos(360°-θ) = <span class="math-hi">cosθ</span> &nbsp;&nbsp; cos(360°+θ) = <span class="math-hi">cosθ</span>\n    </div>\n  </div>\n  <div class="fml-group">\n    <div class="fml-label">y軸轉化（90°, 270°）→ 正餘互換</div>\n    <div class="math-block">\n      sin(90°-θ) = <span class="math-hi3">cosθ</span> &nbsp;&nbsp; sin(90°+θ) = <span class="math-hi3">cosθ</span><br>\n      cos(90°-θ) = <span class="math-hi3">sinθ</span> &nbsp;&nbsp; cos(90°+θ) = <span class="math-hi2">-sinθ</span><br>\n      sin(270°-θ) = <span class="math-hi2">-cosθ</span> &nbsp; sin(270°+θ) = <span class="math-hi2">-cosθ</span><br>\n      cos(270°-θ) = <span class="math-hi2">-sinθ</span> &nbsp; cos(270°+θ) = <span class="math-hi3">sinθ</span>\n    </div>\n  </div>\n  <div class="fml-group">\n    <div class="fml-label">負角公式</div>\n    <div class="math-block">\n      sin(-θ) = <span class="math-hi2">-sinθ</span>（傳遞負號）<br>\n      cos(-θ) = <span class="math-hi">cosθ</span>（吸收負號）<br>\n      tan(-θ) = <span class="math-hi2">-tanθ</span>（傳遞負號）\n    </div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">定理</span><h2 style="color:#9b8fff;">正弦定理</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-block">a/sinA = b/sinB = c/sinC = <span class="math-hi">2R</span>（R 為外接圓半徑）</div>\n  <div class="pts" style="margin-top:8px;">\n    <div class="pt"><div class="dot" style="background:var(--cyan);"></div><div>a : b : c = sinA : sinB : sinC</div></div>\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>使用時機：已知一組對邊角 → 求另一組；和外接圓半徑有關</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">定理</span><h2 style="color:#9b8fff;">餘弦定理</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-block">\n    a² = b² + c² - 2bc cosA<br>\n    b² = c² + a² - 2ca cosB<br>\n    c² = a² + b² - 2ab cosC\n  </div>\n  <div class="math-block" style="border-left-color:var(--cyan);">\n    反過來求角：<span class="math-hi3">cosA = (b²+c²-a²) / 2bc</span>\n  </div>\n  <div class="pts" style="margin-top:8px;">\n    <div class="pt"><div class="dot" style="background:#9b8fff;"></div><div>使用時機：已知二邊夾一角 → 求第三邊；已知三邊 → 求角度</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">公式</span><h2 style="color:#9b8fff;">三角形面積</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <div class="math-block"><span class="math-hi">S = (1/2)ab sinC = (1/2)bc sinA = (1/2)ca sinB</span></div>\n</div>\n\n<hr>\n\n<div class="sec-title"><span class="num" style="background:#9b8fff;">速查</span><h2 style="color:#9b8fff;">特殊角速查表</h2></div>\n<div class="card hl" style="border-color:#6a58e0;">\n  <table>\n    <tr><th>角</th><th>sin</th><th>cos</th><th>tan</th></tr>\n    <tr><td class="g">0°</td><td>0</td><td>1</td><td>0</td></tr>\n    <tr><td class="g">30°</td><td>1/2</td><td>√3/2</td><td>1/√3</td></tr>\n    <tr><td class="g">45°</td><td>√2/2</td><td>√2/2</td><td>1</td></tr>\n    <tr><td class="g">60°</td><td>√3/2</td><td>1/2</td><td>√3</td></tr>\n    <tr><td class="g">90°</td><td>1</td><td>0</td><td>—</td></tr>\n    <tr><td>120°</td><td>√3/2</td><td>-1/2</td><td>-√3</td></tr>\n    <tr><td>135°</td><td>√2/2</td><td>-√2/2</td><td>-1</td></tr>\n    <tr><td>150°</td><td>1/2</td><td>-√3/2</td><td>-1/√3</td></tr>\n    <tr><td>180°</td><td>0</td><td>-1</td><td>0</td></tr>\n    <tr><td>270°</td><td>-1</td><td>0</td><td>—</td></tr>\n    <tr><td>360°</td><td>0</td><td>1</td><td>0</td></tr>\n    <tr><td class="r">15°</td><td class="r">(√6-√2)/4</td><td class="r">(√6+√2)/4</td><td class="r">2-√3</td></tr>\n    <tr><td class="r">75°</td><td class="r">(√6+√2)/4</td><td class="r">(√6-√2)/4</td><td class="r">2+√3</td></tr>\n  </table>\n</div>\n',

/* ════════ 地科 5-2 波浪 ════════ */
'es-5-2': '\n<div class="note-header-block">\n  <div class="nh-tag">EARTH SCIENCE ／ 段考範圍</div>\n  <h1>CH.5-2\u3000波浪</h1>\n  <div class="nh-sub">5-2.1 波浪現象與成因・5-2.2 風浪與湧浪・5-2.3 近岸變化・海嘯</div>\n</div>\n\n<div class="sec-title"><span class="num">5-2.1</span><h2>波浪的現象和成因</h2></div>\n<div class="card hl">\n  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">\n    <div style="background:#0f0f18;border:1px solid var(--border);border-radius:6px;padding:10px 12px;">\n      <div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--gold2);margin-bottom:3px;">波峰</div>\n      <div style="font-size:13px;">波形最高點</div>\n    </div>\n    <div style="background:#0f0f18;border:1px solid var(--border);border-radius:6px;padding:10px 12px;">\n      <div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--gold2);margin-bottom:3px;">波谷</div>\n      <div style="font-size:13px;">波形最低點</div>\n    </div>\n    <div style="background:#0f0f18;border:1px solid var(--border);border-radius:6px;padding:10px 12px;">\n      <div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--gold2);margin-bottom:3px;">波長</div>\n      <div style="font-size:13px;">相鄰兩波峰（或波谷）的距離</div>\n    </div>\n    <div style="background:#0f0f18;border:1px solid var(--border);border-radius:6px;padding:10px 12px;">\n      <div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--gold2);margin-bottom:3px;">波高</div>\n      <div style="font-size:13px;">波峰與波谷的高度差</div>\n    </div>\n    <div style="background:#0f0f18;border:1px solid var(--border);border-radius:6px;padding:10px 12px;">\n      <div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--gold2);margin-bottom:3px;">週期</div>\n      <div style="font-size:13px;">同一點上下振盪一次的時間</div>\n    </div>\n    <div style="background:#0f0f18;border:1px solid var(--border);border-radius:6px;padding:10px 12px;">\n      <div style="font-family:\'Share Tech Mono\',monospace;font-size:9px;color:var(--gold2);margin-bottom:3px;">波速</div>\n      <div style="font-size:13px;"><em>波長 ÷ 週期</em></div>\n    </div>\n  </div>\n  <div class="tip">⚠️ 水分子在<em>原地作圓形振盪</em>，不隨波前進；振盪最大深度 = <em>波長的一半</em></div>\n</div>\n<div class="card">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>最常見是<em>風浪</em>，週期通常在 <em>30 秒以內</em></div></div>\n    <div class="pt"><div class="dot c"></div><div>海底火山、地震產生的波浪週期<b>較久</b>、波長<b>較長</b>（→ 海嘯）</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num">5-2.2</span><h2>風浪與湧浪</h2></div>\n<div class="card hl">\n  <table>\n    <tr><th></th><th>風浪</th><th>湧浪</th></tr>\n    <tr><td class="g">定義</td><td>風域內產生的波浪</td><td>離開風域後繼續傳播的波浪</td></tr>\n    <tr><td class="g">波長/週期</td><td>不一，大小都有</td><td>波長<em>較長</em>、週期<em>較長</em></td></tr>\n    <tr><td class="g">衰減</td><td>快（短波先衰減）</td><td>慢，可傳很遠</td></tr>\n  </table>\n  <div class="tip">⚠️ 近海出現<em>週期 &gt; 8 秒</em>的波浪 → 代表遠方（外海）可能有<em>颱風</em></div>\n</div>\n<div class="card">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>風力越強、吹拂面積越廣、時間越久 → 波高越高、波長越長</div></div>\n    <div class="pt"><div class="dot c"></div><div>風域（fetch）= 海面上陣風吹拂起浪的區域</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num">5-2.3</span><h2>波浪近岸的變化</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>靠近岸邊：週期<em>不變</em>，但波長<em>縮短</em>、波速<em>減慢</em>、波高<em>增大</em></div></div>\n    <div class="pt"><div class="dot"></div><div>原因：水深變淺 → 振盪觸及海底 → 摩擦 → 下層慢、上層堆疊 → 最後<em>崩潰成碎浪</em></div></div>\n  </div>\n</div>\n<div class="card">\n  <div style="font-size:13px;color:var(--cyan);font-weight:700;margin-bottom:8px;border-left:3px solid var(--cyan);padding-left:8px;">海岬 vs 海灣</div>\n  <table>\n    <tr><th></th><th>海岬（突出）</th><th>海灣（凹入）</th></tr>\n    <tr><td class="g">波浪行為</td><td>能量<em>匯聚</em>，波高增大</td><td>能量<em>分散</em>，波高降低</td></tr>\n    <tr><td class="g">地形作用</td><td class="r">侵蝕 &gt; 堆積</td><td class="c">堆積 &gt; 侵蝕（形成沙灘）</td></tr>\n    <tr><td class="g">長期結果</td><td colspan="2">海岸線趨於<em>平直</em></td></tr>\n  </table>\n</div>\n<div class="card">\n  <div style="font-size:13px;color:var(--cyan);font-weight:700;margin-bottom:8px;border-left:3px solid var(--cyan);padding-left:8px;">沿岸流與突堤效應</div>\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>波浪斜交海岸 → 平行分量形成<em>沿岸流</em> → 搬運泥沙、改變地形</div></div>\n    <div class="pt"><div class="dot r"></div><div>沿岸流遇防波堤 → 一側<em>堆積</em>擴大、另一側<em>侵蝕</em>縮小 → <em>突堤效應</em></div></div>\n    <div class="pt"><div class="dot c"></div><div>實例：<b>高美濕地</b>是台中港北側截斷南向沿岸流後堆積泥沙形成的</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num">海嘯</span><h2>海嘯</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot r"></div><div>成因：<em>海底斷層錯動（地震）</em> → 海床垂直位移 → 整層海水上升 → 形成海嘯<br><span style="font-size:12px;color:var(--muted);">另：能量夠大的海底火山、海底山崩也可能造成</span></div></div>\n    <div class="pt"><div class="dot"></div><div>深海傳遞：波速可達 <em>720 km/h</em>，但波高不到 1 公尺（難察覺）</div></div>\n    <div class="pt"><div class="dot"></div><div>靠近岸邊：水深變淺 → 波速減慢 → 波高<em>急劇增大</em>成巨浪</div></div>\n    <div class="pt"><div class="dot c"></div><div>一般風浪振盪<b>不觸及海底</b>；海嘯振盪範圍從<b>海面達到海床</b>（波長達數百公里）</div></div>\n  </div>\n  <div class="tip">⚠️ 台灣若遭海嘯侵襲，<em>東部（太平洋側）</em>受災較嚴重，因為環太平洋地震帶在東側</div>\n</div>\n\n<hr>\n\n<div class="sec-title"><span class="num">考點</span><h2>段考必背清單</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot r"></div><div>波速 = <em>波長 ÷ 週期</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>水分子圓形振盪，最大深度 = <em>波長的一半</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>近岸：週期不變，波長短、波速慢、波高大 → 碎浪</div></div>\n    <div class="pt"><div class="dot r"></div><div>海岬侵蝕、海灣堆積 → 長期海岸線<em>趨於平直</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>近海週期 &gt; 8 秒 → 遠方可能有<em>颱風/風暴</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>海嘯主因：<em>海底地震（斷層垂直錯動）</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>突堤效應：堤防迎流側堆積、背流側侵蝕</div></div>\n  </div>\n</div>\n',

/* ════════ 地科 5-1 ════════ */
'es-5-1': '\n<div class="note-header-block">\n  <div class="nh-tag">EARTH SCIENCE ／ 段考範圍</div>\n  <h1>CH.5-1\u3000海水的組成與結構</h1>\n  <div class="nh-sub">5-1.1 組成・5-1.2 鹽度・5-1.3 水溫・5-1.4 垂直分層</div>\n</div>\n\n<div class="sec-title"><span class="num">5-1.1</span><h2>海水的組成</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>每 1000g 海水：水 <em>965g</em>、海鹽 <em>35g</em>（鹽度平均 35‰）</div></div>\n    <div class="pt"><div class="dot"></div><div>含量最多的三個離子：<em>Cl⁻ &gt; Na⁺ &gt; SO₄²⁻</em></div></div>\n    <div class="pt"><div class="dot c"></div><div><b>陰離子</b>（Cl⁻、SO₄²⁻）→ 火山噴發 ＋ 大氣溶解</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>陽離子</b>（Na⁺、Mg²⁺、Ca²⁺、K⁺）→ 岩石風化</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num">5-1.2</span><h2>表層海水的鹽度分布</h2></div>\n<div class="card hl">\n  <table>\n    <tr><th>位置</th><th>鹽度</th><th>原因</th></tr>\n    <tr><td class="r">紅海、地中海</td><td class="r">最高</td><td>半封閉＋蒸發強＋降水少</td></tr>\n    <tr><td class="g">副熱帶高壓帶</td><td class="g">高</td><td>蒸發量 &gt; 降水量</td></tr>\n    <tr><td>赤道</td><td>次高</td><td>降水多，稀釋鹽分</td></tr>\n    <tr><td class="c">波羅的海</td><td class="c">最低</td><td>大量河流淡水注入</td></tr>\n    <tr><td class="c">極區</td><td class="c">低</td><td>冰川融化＋蒸發量小</td></tr>\n  </table>\n  <div class="tip">⚠️ 核心邏輯：<em>蒸發↑ / 結冰 → 鹽度↑</em>\u3000|\u3000<em>降水↑ / 河流 / 融冰 → 鹽度↓</em></div>\n</div>\n\n<div class="sec-title"><span class="num">5-1.3</span><h2>表層海水的溫度分布</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>表層水溫範圍：<em>−2 ～ 30°C</em>，由赤道往兩極遞減</div></div>\n    <div class="pt"><div class="dot"></div><div>最高溫：<em>北太平洋西側</em>＋<em>北印度洋</em>｜最低溫：<em>兩極</em></div></div>\n  </div>\n  <table style="margin-top:10px;">\n    <tr><th>緯度</th><th>東西差異</th></tr>\n    <tr><td>熱帶（低緯度）</td><td class="r">西側 &gt; 東側</td></tr>\n    <tr><td>溫帶北部（45°～60°N）</td><td class="c">東側 &gt; 西側</td></tr>\n  </table>\n  <div class="tip">⚠️ 影響因素：<em>日照差異</em>（主）＋ <em>洋流</em></div>\n</div>\n\n<div class="sec-title"><span class="num">5-1.4</span><h2>海水溫度的垂直分布</h2></div>\n<div class="card hl">\n  <div class="layers">\n    <div class="layer layer-mix">\n      <div>\n        <div class="lname">① 混合層</div>\n        <div style="font-size:11.5px;color:#9ee;margin-top:2px;">溫變最慢・風浪攪拌均勻</div>\n      </div>\n      <div class="ldetail">~200m 以內</div>\n    </div>\n    <div class="layer layer-thermo">\n      <div>\n        <div class="lname">② 斜溫層（溫躍層）</div>\n        <div style="font-size:11.5px;color:#c8a020;margin-top:2px;">溫變最快</div>\n      </div>\n      <div class="ldetail">過渡層</div>\n    </div>\n    <div class="layer layer-deep">\n      <div>\n        <div class="lname">③ 深水層</div>\n        <div style="font-size:11.5px;color:#6080ee88;margin-top:2px;">最穩定</div>\n      </div>\n      <div class="ldetail"><em>1～3°C</em></div>\n    </div>\n  </div>\n  <div class="pts" style="margin-top:12px;">\n    <div class="pt"><div class="dot"></div><div>斜溫層：<em>赤道明顯</em>、中緯度夏明冬弱、<em>極區不明顯</em></div></div>\n    <div class="pt"><div class="dot c"></div><div>混合層：<b>中緯度最厚</b>（風力強）；熱帶較薄</div></div>\n  </div>\n</div>\n\n<hr>\n\n<div class="sec-title"><span class="num">考點</span><h2>段考必背清單</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot r"></div><div>離子含量：<em>Cl⁻ &gt; Na⁺ &gt; SO₄²⁻</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>鹽度最高：<em>紅海/地中海</em>｜最低：<em>波羅的海</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>副熱帶鹽度 &gt; 赤道（<em>蒸發 &gt; 降水</em>）</div></div>\n    <div class="pt"><div class="dot r"></div><div>熱帶水溫<em>西 &gt; 東</em>；溫帶北部<em>東 &gt; 西</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>三層：混合層→斜溫層→深水層（<em>1~3°C</em>）</div></div>\n    <div class="pt"><div class="dot r"></div><div>暖化→冰川融→北大西洋鹽度↓→<em>溫鹽環流減弱</em></div></div>\n  </div>\n</div>\n',

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
let currentSubject = null;

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
function init() {
  const list = document.getElementById('subj-list');
  SUBJECTS.forEach(s => {
    const total = s.units.reduce((n,u) => n + u.chapters.length, 0);
    const card = document.createElement('div');
    card.className = 'subj-card';
    card.style.setProperty('--c', s.color);
    card.innerHTML = `
      <div class="subj-dot"></div>
      <div class="subj-info">
        <div class="subj-name">${s.name}</div>
        <div class="subj-pub">${s.pub}</div>
      </div>
      <div class="subj-count">${total} 章節</div>
      <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>`;
    card.onclick = () => openSubject(s);
    list.appendChild(card);
  });
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function pushPage(from, to) {
  document.getElementById(from).className = 'page state-hidden-left';
  document.getElementById(to).className   = 'page state-active';
  // scroll to top
  const toEl = document.getElementById(to);
  toEl.scrollTo?.(0, 0);
}

function goBack(to, from) {
  document.getElementById(from).className = 'page state-hidden-right';
  document.getElementById(to).className   = 'page state-active';
}

function openSubject(s) {
  currentSubject = s;

  // topbar
  const topbar = document.getElementById('subj-topbar');
  topbar.style.setProperty('--accent', s.color);
  document.getElementById('subj-topbar-title').textContent = s.name;

  // chapters
  const scroll = document.getElementById('chapter-scroll');
  scroll.innerHTML = '';
  scroll.style.setProperty('--accent', s.color);

  s.units.forEach(u => {
    const sec = document.createElement('div');
    sec.className = 'unit-section';

    const hdr = document.createElement('div');
    hdr.className = 'unit-header';
    hdr.textContent = u.label;
    sec.appendChild(hdr);

    const chList = document.createElement('div');
    chList.className = 'ch-list';

    u.chapters.forEach(ch => {
      const item = document.createElement('div');
      item.className = 'ch-item';
      item.innerHTML = `
        <div class="ch-status ${ch.ready ? 'ready' : 'wip'}"></div>
        <div class="ch-name">${ch.name}</div>
        <span class="ch-badge ${ch.ready ? 'ready' : 'wip'}">${ch.ready ? 'READY' : '施工中'}</span>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
          stroke="#66667a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>`;
      item.onclick = () => openNote(s, ch);
      chList.appendChild(item);
    });

    sec.appendChild(chList);
    scroll.appendChild(sec);
  });

  pushPage('page-home', 'page-subject');
}

function openNote(s, ch) {
  if (ch.ext) { window.location.href = ch.ext; return; }
  // topbar
  const topbar = document.getElementById('note-topbar');
  topbar.style.setProperty('--accent', s.color);
  document.getElementById('note-back-label').textContent = s.name;
  document.getElementById('note-topbar-title').textContent = ch.name;

  // content
  const body = document.getElementById('note-body');
  body.style.setProperty('--accent', s.color);

  if (NOTES[ch.id]) {
    body.innerHTML = NOTES[ch.id];
  } else {
    body.innerHTML = `
      <div class="wip-screen">
        <div class="wt">${s.name} ／ ${ch.name}</div>
        <div class="wn" style="color:${s.color}">建置中<span class="blink">_</span></div>
        <div class="ws">這個章節的筆記還沒完成<br>資料進來之後會更新</div>
      </div>`;
  }

  pushPage('page-subject', 'page-note');
}

init();
</script>
