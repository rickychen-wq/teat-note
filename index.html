<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>NOTE.SYS</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:     #09090f;
  --bg2:    #111119;
  --bg3:    #1a1a26;
  --border: #23232f;
  --text:   #e4e4f0;
  --muted:  #66667a;
  --gold:   #f0c040;
  --gold2:  #aa7a10;
  --cyan:   #3dd6c8;
  --red:    #ff4a6e;
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  height: 100%;
  overflow: hidden; /* pages handle their own scroll */
}

/* ══════════════════════════════
   PAGE STACK SYSTEM
══════════════════════════════ */
#app {
  position: fixed;
  inset: 0;
  overflow: hidden;
}

.page {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
  transition: transform .32s cubic-bezier(.4,0,.2,1),
              opacity   .32s cubic-bezier(.4,0,.2,1);
  will-change: transform;
}

/* states */
.page.state-hidden-right { transform: translateX(100%); pointer-events:none; }
.page.state-hidden-left  { transform: translateX(-30%); opacity:.6; pointer-events:none; }
.page.state-active       { transform: translateX(0); opacity:1; }

/* ── top bar ── */
.topbar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: rgba(9,9,15,.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 52px;
  gap: 8px;
  flex-shrink: 0;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--accent, var(--gold));
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px;
  cursor: pointer;
  padding: 8px 0;
  flex-shrink: 0;
}
.back-btn svg { width:18px; height:18px; flex-shrink:0; }

.topbar-title {
  flex: 1;
  text-align: center;
  font-size: 15px;
  font-weight: 700;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
/* spacer to balance back btn */
.topbar-spacer { width: 60px; flex-shrink:0; }

/* ══════════════════════════════
   PAGE 0 — HOME
══════════════════════════════ */
#page-home {
  display: flex;
  flex-direction: column;
}

.home-hero {
  padding: 48px 20px 32px;
  text-align: center;
}
.home-hero .sys-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  color: var(--gold2);
  margin-bottom: 8px;
}
.home-hero .sys-title {
  font-size: 42px;
  font-weight: 900;
  color: var(--gold);
  letter-spacing: 4px;
  line-height: 1;
}
.home-hero .sys-sub {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2px;
  margin-top: 10px;
}

.subj-list {
  padding: 0 16px 40px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.subj-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: background .15s, border-color .15s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.subj-card:active { background: var(--bg3); }

.subj-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
  background: var(--c);
  box-shadow: 0 0 8px var(--c);
}
.subj-info { flex: 1; min-width: 0; }
.subj-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--c);
  line-height: 1.2;
}
.subj-pub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 2px;
}
.subj-count {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  flex-shrink: 0;
}
.chevron {
  color: var(--muted);
  flex-shrink: 0;
}

/* ══════════════════════════════
   PAGE 1 — SUBJECT CHAPTERS
══════════════════════════════ */
.chapter-scroll {
  padding: 16px 16px 40px;
}

.unit-section { margin-bottom: 24px; }

.unit-header {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--muted);
  padding: 0 4px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.unit-header::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.ch-list {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}

.ch-item {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  gap: 12px;
  cursor: pointer;
  transition: background .15s;
  user-select: none;
  border-bottom: 1px solid var(--border);
}
.ch-item:last-child { border-bottom: none; }
.ch-item:active { background: var(--bg3); }

.ch-status {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.ch-status.ready {
  background: var(--accent);
  box-shadow: 0 0 5px var(--accent);
}
.ch-status.wip { background: var(--border); }

.ch-name {
  flex: 1;
  font-size: 14px;
  line-height: 1.35;
}

.ch-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  padding: 2px 7px;
  border-radius: 20px;
  flex-shrink: 0;
}
.ch-badge.ready {
  color: var(--accent);
  border: 1px solid var(--accent);
  background: rgba(255,255,255,.03);
}
.ch-badge.wip { color: var(--muted); border: 1px solid var(--border); }

/* ══════════════════════════════
   PAGE 2 — NOTE CONTENT
══════════════════════════════ */
.note-scroll {
  padding: 20px 16px 60px;
}

/* note typography */
.note-body { font-size: 14px; line-height: 1.75; }

.note-header-block {
  border-left: 4px solid var(--gold);
  padding: 14px 16px;
  margin-bottom: 24px;
  background: linear-gradient(90deg, rgba(240,192,64,.07) 0%, transparent 80%);
  border-radius: 0 8px 8px 0;
}
.note-header-block .nh-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: var(--gold2);
  letter-spacing: 3px;
  margin-bottom: 5px;
}
.note-header-block h1 { font-size: 18px; font-weight: 900; color: var(--gold); line-height: 1.3; }
.note-header-block .nh-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

.sec-title {
  display: flex; align-items: center; gap: 8px;
  margin: 24px 0 10px;
}
.sec-title .num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  background: var(--gold);
  color: #000;
  padding: 2px 7px;
  border-radius: 3px;
  flex-shrink: 0;
}
.sec-title h2 { font-size: 14px; font-weight: 700; color: var(--gold); }

.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
  margin-bottom: 10px;
}
.card.hl { border-color: var(--gold2); }

.pts { display: flex; flex-direction: column; gap: 8px; }
.pt  { display: flex; gap: 9px; align-items: flex-start; font-size: 13.5px; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--gold); margin-top:8px; flex-shrink:0; }
.dot.c { background: var(--cyan); }
.dot.r { background: var(--red); }

.note-body em { font-style:normal; color:var(--gold); font-weight:700; }
.note-body b  { color:var(--cyan); font-weight:700; }
.note-body .r { color:#ff8099; font-weight:600; }

.note-body table {
  width:100%;
  border-collapse:collapse;
  font-size:12.5px;
  margin-top:6px;
  display:block;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
}
.note-body th {
  background:rgba(240,192,64,.1);
  color:var(--gold);
  font-weight:700;
  padding:7px 10px;
  text-align:left;
  border-bottom:2px solid var(--gold2);
  white-space:nowrap;
}
.note-body td { padding:7px 10px; border-bottom:1px solid var(--border); }
.note-body tr:last-child td { border-bottom:none; }
.note-body td.g { color:var(--gold); font-weight:600; }
.note-body td.c { color:var(--cyan); font-weight:600; }
.note-body td.r { color:#ff8099; font-weight:600; }

.layers { border-radius: 8px; overflow: hidden; margin-top: 8px; }
.layer  { padding:10px 14px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
.layer-mix    { background:rgba(61,214,200,.13); border-left:4px solid var(--cyan); }
.layer-thermo { background:rgba(240,192,64,.10);  border-left:4px solid var(--gold); }
.layer-deep   { background:rgba(100,120,220,.13); border-left:4px solid #6080ee; }
.lname { font-weight:700; font-size:13px; }
.layer-mix .lname    { color:var(--cyan); }
.layer-thermo .lname { color:var(--gold); }
.layer-deep .lname   { color:#8aabff; }
.ldetail { font-size:11.5px; color:var(--muted); text-align:right; flex-shrink:0; }

.tip {
  background:rgba(255,74,110,.07);
  border:1px solid rgba(255,74,110,.28);
  border-radius:8px;
  padding:10px 12px;
  margin-top:8px;
  font-size:12.5px;
  color:#ffccd5;
  line-height:1.65;
}

.note-body hr { border:none; border-top:1px solid var(--border); margin:20px 0; }

/* wip */
.wip-screen {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:55vh; text-align:center; gap:10px;
}
.wip-screen .wt { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:3px; }
.wip-screen .wn { font-size:20px; font-weight:900; }
.wip-screen .ws { font-size:13px; color:var(--muted); line-height:1.7; }
.blink { animation:blink 1.2s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* scanline */
body::after {
  content:'';
  pointer-events:none;
  position:fixed; inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 4px);
  z-index:9999;
}

/* ── 雜誌單字表 (mag) ── */
.mag-unit { margin-bottom:24px; }
.mag-unit-hdr { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--cyan); letter-spacing:2px; margin-bottom:8px; display:flex; align-items:center; gap:8px; }
.mag-unit-hdr::after { content:''; flex:1; height:1px; background:var(--border); }
.mag-unit-title { font-size:13px; font-weight:700; color:var(--text); margin-bottom:8px; padding-left:4px; }
.vtbl { width:100%; border-collapse:collapse; font-size:12.5px; margin-bottom:6px; display:block; overflow-x:auto; -webkit-overflow-scrolling:touch; }
.vtbl th { padding:6px 10px; text-align:left; font-weight:700; border-bottom-width:2px; border-bottom-style:solid; font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px; white-space:nowrap; }
.vtbl th.g { background:rgba(240,192,64,.1); color:var(--gold); border-bottom-color:var(--gold2); }
.vtbl th.c { background:rgba(61,214,200,.08); color:var(--cyan); border-bottom-color:rgba(61,214,200,.5); }
.vtbl th.s { background:rgba(80,80,100,.15); color:var(--muted); border-bottom-color:#3a3a4a; }
.vtbl td { padding:6px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
.vtbl tr:last-child td { border-bottom:none; }
.vtbl td.w { font-family:'Share Tech Mono',monospace; color:var(--gold); width:40%; }
.vtbl td.w.ph { color:var(--cyan); }
.vtbl td.w.sm { color:var(--muted); font-size:11px; }
.vtbl td.zh { font-size:12.5px; line-height:1.5; }
.vtbl td.zh .pos { font-size:10px; color:var(--muted); font-family:'Share Tech Mono',monospace; margin-right:2px; }
.vtbl td.zh.sm { font-size:11.5px; color:#9999bb; }
.mag-card-s { border-color:#3a3a4a !important; background:#0e0e16 !important; }
.mag-card-c { border-color:rgba(61,214,200,.35) !important; }

/* ── 公民 tabs (cv) ── */
.cv-tab-bar { display:flex; border-bottom:2px solid var(--border); position:sticky; top:52px; background:rgba(9,9,15,.95); backdrop-filter:blur(12px); z-index:5; }
.cv-tab { flex:1; padding:10px 4px; text-align:center; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; letter-spacing:1px; }
.cv-tab.active { color:#60cc80; border-bottom-color:#60cc80; }
.cv-sec { display:none; padding-top:16px; }
.cv-sec.active { display:block; }
.cv-sub { font-size:13px; font-weight:700; color:var(--cyan); margin:14px 0 8px; border-left:3px solid var(--cyan); padding-left:10px; }
.cv-eg { display:flex; gap:8px; align-items:flex-start; background:rgba(61,214,200,.06); border:1px solid rgba(61,214,200,.2); border-radius:6px; padding:9px 12px; margin-top:8px; font-size:12.5px; color:#a8f0e8; line-height:1.65; }
.cv-eg-lbl { font-family:'Share Tech Mono',monospace; font-size:9px; background:var(--cyan); color:#000; padding:1px 6px; border-radius:2px; flex-shrink:0; margin-top:2px; }
.cmp-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
.cmp-g { background:rgba(240,192,64,.08); border:1px solid rgba(240,192,64,.35); border-radius:6px; padding:12px 14px; }
.cmp-c { background:rgba(61,214,200,.08); border:1px solid rgba(61,214,200,.35); border-radius:6px; padding:12px 14px; }
.cmp-tag { display:inline-block; font-size:10px; font-family:'Share Tech Mono',monospace; padding:1px 7px; border-radius:10px; margin-bottom:5px; }
.cmp-g .cmp-tag { background:rgba(240,192,64,.2); color:var(--gold); }
.cmp-c .cmp-tag { background:rgba(61,214,200,.2); color:var(--cyan); }
.cmp-g .cmp-title { font-size:14px; font-weight:900; color:var(--gold); margin-bottom:5px; }
.cmp-c .cmp-title { font-size:14px; font-weight:900; color:var(--cyan); margin-bottom:5px; }
.cmp-body { font-size:12.5px; color:var(--text); line-height:1.65; }
.feat-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
.feat-card { background:rgba(240,192,64,.06); border:1px solid rgba(240,192,64,.25); border-radius:6px; padding:10px 12px; text-align:center; }
.feat-title { font-size:13px; font-weight:900; color:var(--gold); margin-bottom:4px; }
.feat-body { font-size:11.5px; color:var(--muted); line-height:1.5; }
.div-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
.div-r { background:rgba(255,74,110,.07); border:1px solid rgba(255,74,110,.28); border-radius:6px; padding:10px 12px; }
.div-y { background:rgba(240,192,64,.07); border:1px solid rgba(240,192,64,.28); border-radius:6px; padding:10px 12px; }
.div-c { background:rgba(61,214,200,.07); border:1px solid rgba(61,214,200,.28); border-radius:6px; padding:10px 12px; }
.div-dtitle { font-size:12px; font-weight:900; margin-bottom:5px; }
.div-r .div-dtitle { color:#ff8099; }
.div-y .div-dtitle { color:var(--gold); }
.div-c .div-dtitle { color:var(--cyan); }
.div-dbody { font-size:11px; color:var(--muted); line-height:1.5; }
.checklist { background:rgba(240,192,64,.04); border:1px solid var(--gold2); border-radius:6px; padding:14px 16px; margin-bottom:12px; }

/* ── 數學 (math) ── */
.math-block { background:rgba(0,0,0,.35); border-left:3px solid #9b8fff; padding:10px 14px; margin:8px 0; border-radius:0 8px 8px 0; font-size:13px; line-height:1.9; }
.math-warn { background:rgba(255,74,110,.07); border-left:3px solid var(--red); padding:10px 14px; margin:8px 0; border-radius:0 8px 8px 0; font-size:12.5px; color:rgba(255,150,150,.85); }
.math-hi  { color:#9b8fff; font-weight:600; }
.math-hi2 { color:var(--red); font-weight:600; }
.math-hi3 { color:var(--cyan); font-weight:600; }
.math-hi4 { color:var(--gold); font-weight:600; }
.fml-group { margin-bottom:16px; }
.fml-label { font-family:'Share Tech Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:2px; margin-bottom:5px; }

/* ── 國文 (chinese) ── */
.cn-poem-line { display:grid; grid-template-columns:1fr 1fr; gap:0; border-bottom:1px solid var(--border); padding:10px 14px; }
.cn-poem-line:first-child { border-top:1px solid var(--border); }
.cn-pl-orig { font-size:15px; color:#c8c0a0; letter-spacing:2px; line-height:1.7; }
.cn-pl-tran { font-size:13px; color:var(--text); line-height:1.7; }
.cn-tip-r { background:rgba(255,74,110,.07); border:1px solid rgba(255,74,110,.28); border-radius:6px; padding:10px 14px; margin-top:8px; font-size:13px; color:#ffccd5; line-height:1.65; }
.cn-tip-c { background:rgba(61,214,200,.06); border:1px solid rgba(61,214,200,.25); border-radius:6px; padding:10px 14px; margin-top:8px; font-size:13px; color:#b0f0ea; line-height:1.65; }
.cn-tip-y { background:rgba(240,192,64,.06); border:1px solid rgba(240,192,64,.22); border-radius:6px; padding:10px 14px; margin-top:8px; font-size:13px; color:#f0e0a0; line-height:1.65; }
.cn-cmp { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:12px; }
.cn-cmp-g { background:rgba(240,192,64,.06); border:1px solid var(--gold2); border-radius:6px; padding:12px 14px; }
.cn-cmp-c { background:rgba(61,214,200,.06); border:1px solid var(--cyan); border-radius:6px; padding:12px 14px; }
.cn-cmp-title { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:1px; margin-bottom:8px; }
.cn-cmp-g .cn-cmp-title { color:var(--gold); }
.cn-cmp-c .cn-cmp-title { color:var(--cyan); }
.cn-exam { background:linear-gradient(135deg,rgba(240,192,64,.05),rgba(255,74,110,.04)); border:1px solid rgba(240,192,64,.35); border-radius:6px; padding:14px 16px; margin-bottom:10px; }
.cn-exam-title { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--red); letter-spacing:2px; margin-bottom:10px; }
.cn-chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.cn-chip { font-size:11px; padding:2px 9px; border-radius:20px; background:rgba(240,192,64,.1); border:1px solid var(--gold2); color:var(--gold); }
.cn-chip.c { background:rgba(61,214,200,.08); border-color:var(--cyan); color:var(--cyan); }
.cn-art-hdr { display:flex; align-items:center; gap:12px; margin:28px 0 14px; flex-wrap:wrap; }
.cn-art-badge { font-family:'Share Tech Mono',monospace; font-size:10px; background:var(--gold); color:#000; padding:2px 9px; border-radius:2px; white-space:nowrap; }
.cn-art-badge.c { background:var(--cyan); }
.cn-art-h2 { font-size:18px; font-weight:900; color:var(--gold); }
.cn-art-h2.c { color:var(--cyan); }
.cn-art-author { font-size:11px; color:var(--muted); font-family:'Share Tech Mono',monospace; margin-left:auto; white-space:nowrap; }

/* ── 歷史 (history) ── */
.sub-title { font-size:13px; font-weight:700; color:var(--cyan); margin:14px 0 8px; border-left:3px solid var(--cyan); padding-left:10px; }
.eg { display:flex; gap:8px; align-items:flex-start; background:rgba(61,214,200,.06); border:1px solid rgba(61,214,200,.2); border-radius:6px; padding:9px 12px; margin-top:8px; font-size:12.5px; color:#a8f0e8; line-height:1.65; }
.eg-label { font-family:'Share Tech Mono',monospace; font-size:9px; background:var(--cyan); color:#000; padding:1px 6px; border-radius:2px; flex-shrink:0; margin-top:2px; }
.compare-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
.three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:10px; }
.cmp-card { border-radius:6px; padding:12px 14px; }
.cmp-card.gold { background:rgba(240,192,64,.08); border:1px solid rgba(240,192,64,.35); }
.cmp-card.cyan { background:rgba(61,214,200,.08); border:1px solid rgba(61,214,200,.35); }

    <div class="tip">⚠️ 補充：<em>轉型正義（transitional justice）</em>= 國家社會於殖民時期或非民主時期，以國家或族群力量所為之政治迫害或不義舉止，所進行的彌補行為，具矯正正義的精神</div>
  </div>

  <div class="sec-title"><span class="num">五</span><h2>為何不同社會群體會因追求公平正義產生衝突？</h2></div>
  <div class="card hl">
    <table>
      <tr><th>面向</th><th>內容</th></tr>
      <tr><td class="r">原因</td><td>不同群體間由於做法與追求的目標不盡相同，資源分配的方式也會不同，使得對「公平正義」的理解因而不同</td></tr>
      <tr><td class="r">難題</td><td>在自由民主的社會中，眾多的團體會提出多元且數量龐大的訴求，但在資源有限的情況下，政府無法回應且滿足每一個訴求</td></tr>
      <tr><td class="g">解決</td><td>政府可以<em>羅爾斯的正義二原則</em>為大方向，做為最後「公平正義」分配的原則</td></tr>
    </table>
  </div>

  <div class="sec-title"><span class="num">補充</span><h2>程序正義 vs 實質正義</h2></div>
  <div class="card hl">
    <table>
      <tr><th>類型</th><th>程序正義</th><th>實質正義</th></tr>
      <tr><td class="g">意義</td><td>指決策的過程要公平合理，以確保做出的決定合理且經得起考驗，達到實質正義</td><td>指決定的內容或行為的結果合乎法理或正義，合乎與否主要以法理為主要判斷依據</td></tr>
      <tr><td class="g">舉例</td><td>警察機關在進行調查犯罪時，必須符合法律相關程序</td><td>警察進行犯罪調查的目的，是在維護社會安寧秩序</td></tr>
    </table>
  </div>

  <div class="sec-title"><span class="num">補充</span><h2>國際轉型正義案例</h2></div>
  <div class="card hl">
    <table>
      <tr><th>國家</th><th>事件</th><th>作法</th></tr>
      <tr><td class="r">德國</td><td>納粹時期人權侵害</td><td>政府投入資源調查、還原史實並糾正；聯邦訂定教育課綱，規定學校清楚闡述納粹迫害政策；目的：「克服過去、清理過去」</td></tr>
      <tr><td class="c">南非</td><td>1948～1994年種族隔離政策</td><td>成立<em>真相和解委員會（TRC）</em>，進行調查與真相還原；目的：「用特赦換真相，用真相換和解」</td></tr>
      <tr><td class="g">我國</td><td>228事件</td><td>1996年李登輝道歉；頒發回復名譽證書；1995年通過《228事件處理及補償條例》、2018年修正；目的：處理賠償事宜，重視歷史教育</td></tr>
    </table>
  </div>

</div><!-- end 6-1 -->


<!-- ══════════════ 6-2 社會安全制度 ══════════════ -->
<div class="section" id="s1">

  <div class="sec-title"><span class="num">一</span><h2>社會安全制度的定義與內涵</h2></div>
  <div class="card hl">
    <div class="pts">
      <div class="pt"><div class="dot"></div><div>定義：指<em>國家</em>透過系統性的長期政策，將公共資源（金錢、服務等）分配給生活遭逢轉變而陷入困境或生活貧苦困難的人民</div></div>
      <div class="pt"><div class="dot"></div><div>目的：保障人民並維持<em>最低生活水準、具人性尊嚴</em>的基本生活</div></div>
    </div>
    <div class="sub-title">內涵</div>
    <div class="pts">
      <div class="pt"><div class="dot c"></div><div>每個人的基本生活得到滿足 → 擁有均等的機會 → 追求理想的生活</div></div>
      <div class="pt"><div class="dot c"></div><div>國家落實社會安全制度具有實踐<em>公平正義</em>的實質意義</div></div>
    </div>
  </div>

  <div class="sec-title"><span class="num">二</span><h2>社會安全制度的演變</h2></div>
  <div class="card hl">
    <div class="sub-title">西方社會（國際）</div>
    <table>
      <tr><th>年份</th><th>國家</th><th>名稱</th><th>重點</th></tr>
      <tr><td class="g">1601年</td><td>英國</td><td><em>濟貧法</em></td><td>世界上最早的社會救助法，解決貧困問題是政府應盡的責任</td></tr>
      <tr><td class="g">1883年</td><td>德國</td><td><em>勞工疾病保險</em></td><td>實施以基層勞工為主的健康保險制度，開啟保障勞工權益的序幕</td></tr>
      <tr><td class="g">1935年</td><td>美國</td><td><em>社會安全法案</em></td><td>當時經濟大恐慌使失業人口激增，政府立法解決工業化社會帶來的各種風險</td></tr>
      <tr><td class="g">1942年</td><td>英國</td><td><em>貝佛里奇報告書</em></td><td>「從搖籃到墳墓」的社會福利制度，為英國公民提供醫療、就業、養老和其它福利保障</td></tr>
    </table>
    <div class="sub-title">台灣</div>
    <table>
      <tr><th>年份</th><th>法律/政策</th><th>說明</th></tr>
      <tr><td class="g">1953年</td><td>陸海空軍軍人保險條例</td><td>現為軍人保險條例</td></tr>
      <tr><td class="g">1958年</td><td>勞工保險條例、公務人員保險條例</td><td>現為公教人員保險法</td></tr>
      <tr><td>1973年</td><td>兒童福利法</td><td>現為兒童及少年福利與權益保障法</td></tr>
      <tr><td>1980年</td><td>老人福利法、殘障福利法</td><td>現為身心障礙者權益保障法</td></tr>
      <tr><td class="r">1995年</td><td><em>全民健康保險法</em> ⭐</td><td>全民強制納保的社會保險</td></tr>
      <tr><td>2007年</td><td>國民年金法</td><td></td></tr>
      <tr><td>2012年</td><td>建國一百年社會福利政策綱領</td><td>6大方向：社會救助與津貼、社會保險、福利服務、健康與醫療照護、就業安全、居住正義與社區營造</td></tr>
      <tr><td class="r">2015年</td><td><em>長期照顧服務法</em>（2017年實施）⭐</td><td>因應少子化與高齡化危機</td></tr>
    </table>
  </div>

  <div class="sec-title"><span class="num">三</span><h2>社會安全制度在現代社會的重要性</h2></div>
  <div class="card hl">
    <div class="sub-title">（一）對處於不利處境的勞工</div>
    <table>
      <tr><th>問題</th><th>說明</th></tr>
      <tr><td class="r">薪資與勞動條件不利</td><td>勞工不具生產工具，與資本家討價還價的能力被削弱，僅能維持基本生活</td></tr>
      <tr><td class="r">失業與健康傷害</td><td>勞工有可能被解僱失業，也可能因勞動環境不佳身體健康遭受傷害。社會安全制度尤顯重要</td></tr>
    </table>
    <div class="sub-title">（二）風險社會帶來的不確定性</div>
    <table>
      <tr><th>風險類型</th><th>說明</th></tr>
      <tr><td class="g">日常事故風險</td><td>風險來自於交通意外、疾病、死亡與職業傷害等一般日常事故</td></tr>
      <tr><td class="g">經濟環境風險</td><td>風險來自於出生的家庭環境與適應社會生活的能力等。隨著經濟發展與環境變遷，風險日漸提升</td></tr>
    </table>
    <div class="sub-title">（三）家庭支持功能的下滑</div>
    <table>
      <tr><th></th><th>說明</th></tr>
      <tr><td class="g">傳統社會</td><td>傳統大家庭通常有較多的家庭成員，以彼此互助的形式，扮演提供經濟援助或協助支持的角色</td></tr>
      <tr><td class="c">現代社會</td><td>由於少子化與工作型態等結構性因素的改變，家庭形式以小家庭居多，當家庭遭遇變故時，常面臨家庭支持功能不彰的困境</td></tr>
    </table>
  </div>

  <div class="sec-title"><span class="num">四</span><h2>三種社會安全制度類型</h2></div>
  <div class="card hl">
    <div class="three-col">
      <div class="col-card gold">
        <div class="col-title">社會保險<br>分攤風險</div>
        <div class="col-body">
          意義：國家透過立法<em>強制</em>人民參加保險，遭遇疾病、傷殘、失業、生育或死亡等事故，即能獲得所給予的金錢、實物或服務<br><br>
          核心精神：<em>風險分攤</em>與「社會互助」；政府將符合資格者「強制納保」，擴大分攤母數以降低每人平均負擔<br><br>
          財源：政府、雇主與納保人<br><br>
          例：全民健保、勞工保險、軍公教人員保險、國民年金
        </div>
      </div>
      <div class="col-card cyan">
        <div class="col-title">社會福利服務<br>全面提升福祉</div>
        <div class="col-body">
          意義：指國家照顧人民之經濟、社會、教育與健康等需求的經濟補助或服務<br><br>
          核心精神：保障人民的基本生活外，同時也<em>全面提升</em>人民的生活福祉<br><br>
          特性：針對不同群體的需求給予部分社會成員福利服務<br><br>
          財源：政府編列預算（稅收為主）<br><br>
          例：公共托育、社會住宅、育兒津貼、設置身心障礙者日間照顧中心、提供老農津貼
        </div>
      </div>
      <div class="col-card red">
        <div class="col-title">社會救助<br>確保基本生存</div>
        <div class="col-body">
          意義：指政府照顧低收入戶、救助遭受急難或災害者，透過生活扶助、醫療補助、急難救助或災害救助等方式，維持基本的生活水準<br><br>
          核心精神：因社會保險不足而面臨經濟困境者，<em>確保基本生存保障</em><br><br>
          財源：政府編列預算（稅收為主）<br><br>
          服務方式：透過《社會救助法》以金錢援助、以工代賑等<br><br>
          例：低收入戶生活扶助、急難救助金、就學生活補助
        </div>
      </div>
    </div>
    <div class="tip">⚠️ 政府應建構以<em>社會保險</em>為主，社會福利服務為輔，<em>社會救助</em>為最後一道防線的社會安全體系</div>
  </div>

  <div class="sec-title"><span class="num">五</span><h2>以全民健保探討社會安全制度的難題</h2></div>
  <div class="card hl">
    <div class="pts">
      <div class="pt"><div class="dot"></div><div>1994年實施全民健保，屬於全民強制納保的<em>社會保險</em></div></div>
      <div class="pt"><div class="dot"></div><div>財源：主要來自民眾、雇主與政府共同繳納的保費；補充：公益彩券與菸捐等</div></div>
    </div>
    <table style="margin-top:10px;">
      <tr><th>難題面向</th><th>問題</th><th>解決方式</th></tr>
      <tr><td class="g">（一）公平性</td><td>偏鄉與離島的醫療人力資源較少，居民常須到市區或台灣本島就醫。繳納相同保費，卻沒有相同醫療資源</td><td>政府透過公費醫師制度、鼓勵西醫基層及醫院醫師到醫療資源不足地區提供服務</td></tr>
      <tr><td class="c">（二）效率性</td><td>社會資源有限，各種社會安全給付與服務都應設有一定的資格條件，以免社會資源遭到浪費。但條件過嚴或過寬都有問題</td><td>依據健保2013年針對醫療資源浪費情形進行認知調查，持續改善健保資源濫用問題</td></tr>
      <tr><td class="r">（三）責任性</td><td>全民健保因醫療分級未落實、醫療浪費與健保收入減少而支付增加等因素，逐漸浮現財政困難的問題</td><td>政府：調整健保費率或部分負擔費用；國民：平時留意自身健康，避免過度使用健保資源；落實分級醫療制度</td></tr>
    </table>
  </div>

</div><!-- end 6-2 -->


<!-- ══════════════ 6-3 多元文化 ══════════════ -->
<div class="section" id="s2">

  <div class="sec-title"><span class="num">概念</span><h2>多元文化主義（Multiculturalism）</h2></div>
  <div class="card hl">
    <div class="pts">
      <div class="pt"><div class="dot"></div><div><em>文化差異</em>：不同文化的差異常來自背後不同的社會規範、價值觀，許多行為與表現沒有好壞、對錯之分</div></div>
      <div class="pt"><div class="dot"></div><div><em>文化衝突</em>：不同文化間可能因認知差異、各執己見，而發生文化摩擦，甚至可能激化出更為嚴重的文化衝突</div></div>
      <div class="pt"><div class="dot c"></div><div><em>多元文化主義</em>：指尊重不同社會身分、文化認同間的差異，讓不同族群的聲音、看法、價值觀皆受到同等的對待；提倡人們應該試著理解不同文化的內涵，不同的文化群體也應該相互溝通、共存共榮</div></div>
    </div>
  </div>

  <div class="sec-title"><span class="num">一</span><h2>多元文化的衝突及原因</h2></div>
  <div class="card hl">
    <div class="sub-title">（一）我族中心主義</div>
    <table>
      <tr><th>面向</th><th>內容</th></tr>
      <tr><td class="g">意義</td><td>1.指以自己的文化標準去衡量其他族群的文化，並認為自身文化最優秀，進而貶低其他族群<br>2.人類傾向認同自己的世界觀及習慣的生活方式，其他都是「怪異的」、「不可取的」，常有貶抑甚至排斥其他文化的情形</td></tr>
      <tr><td class="g">舉例</td><td>1.古希臘人將使用不同語言的民族，稱為野蠻人<br>2.中國將周遭少數民族、藩屬國稱為蠻夷之邦<br>3.古人所云的「非我族類，其心必異」即是典型的代表</td></tr>
      <tr><td class="r">造成問題</td><td>現代的多元文化的社會中，我族中心主義恐怕成為多元文化和諧共存的絆腳石</td></tr>
      <tr><td class="c">解決方式</td><td>當個人面對不同文化時，不要先從自己的文化立場去判斷其他文化的表現，而是要理解對方為何要這樣做，才能共創認識、接納欣賞異己的能力</td></tr>
    </table>

    <div class="sub-title">（二）文化位階與壓迫</div>
    <table>
      <tr><th>面向</th><th>內容</th></tr>
      <tr><td class="g">意義</td><td>指社會將不同的文化群體之間，進行過度簡化及二分的分類與排序，給予優／劣、進步／落後、優雅／粗俗等評價</td></tr>
      <tr><td class="g">舉例</td><td>1948年政府推行「說國語運動」政策，禁止民眾於特定場所（如：學校）使用閩南語、客語等各族群之方言，導致語言層面上的文化位階，形成摩擦或衝突，更造成各族群語言產生傳承與使用的困境</td></tr>
      <tr><td class="r">造成問題</td><td>文化位階隱含著對特定群體的偏見與歧視，若放任其發展，占優勢的文化恐將成為該社會的<em>文化霸權</em>（一個文化相對於其他文化，具有在社會或其他體制上的優勢與主宰地位）</td></tr>
      <tr><td class="c">解決方式</td><td>在政策與法律施行時都會考慮其影響，避免文化歧視的產生</td></tr>
    </table>
    <div class="eg"><span class="eg-label">補充</span>種族歧視 = 認為自己的族群文化最優秀，進而去貶抑或排斥其他族群及文化，並採取實際行動，以不公平的方式、規定對待其他種族成員（例：美國1960年代前種族隔離政策）<br><br>種族清洗 = 相較於種族主義、種族歧視的極端展現，泛指基於「族群同質化」目的，以各種非人道手段，將某一族群團體從某一領土上驅離、甚至「清除」、「滅絕」（例：緬甸若開邦丁村羅興亞村民遭屠殺）</div>
  </div>

  <div class="sec-title"><span class="num">二</span><h2>我國透過政策保障多元文化</h2></div>
  <div class="card hl">
    <div class="sub-title">（一）原住民族狩獵權的討論</div>
    <div class="pts">
      <div class="pt"><div class="dot"></div><div>2013年布農族獵人Talum Suqluman（王光祿）被警方以持有非自製獵槍及獵殺保育類動物逮捕，臺東地檢署依違反《槍砲彈藥刀械管制條例》及《野生動物保育法》起訴，最終被判處3年6個月徒刑定讞</div></div>
      <div class="pt"><div class="dot c"></div><div><em>釋字第803號</em>：法規要求原住民族於非定期狩獵須提前申請，且申報打獵數量的程序欠缺彈性；且自製獵槍規範不足，無法使原住民族安全從事合法狩獵活動，應修正法規以保障原住民族從事狩獵之文化權利</div></div>
    </div>
    <div class="sub-title">（二）我國政策對原住民族狩獵的管理與保障</div>
    <div class="pts">
      <div class="pt"><div class="dot"></div><div>2017年起，農委會林務局透過生態專業團隊與部落合作，進行原住民狩獵自主管理輔導計畫</div></div>
    </div>
    <div class="sub-title">法律保障</div>
    <div class="pts">
      <div class="pt"><div class="dot c"></div><div>《憲法增修條文》第10條第11項：國家肯定多元文化，並積極維護發展原住民族語言及文化</div></div>

    <div class="pts">
      <div class="pt"><div class="dot r"></div><div>1945年蘇聯依照《雅爾達協定》對日開戰，占領滿洲國及朝鮮半島</div></div>
      <div class="pt"><div class="dot r"></div><div>美、蘇兩國以北緯38度線為界分占；蘇聯占有<em>東北亞大片土地</em>，共產勢力在亞洲迅速擴張</div></div>

    <div class="pts">
      <div class="pt"><div class="dot r"></div><div>蘇聯占領東北地區，阻止國民政府接收，讓中共軍隊進入東北，中共獲得日軍遺留的武器</div></div>
      <div class="pt"><div class="dot r"></div><div>1946年3月，國共在東北與華北等地爆發內戰；美國派<em>馬歇爾</em>來調停，但失敗</div></div>
      <div class="pt"><div class="dot r"></div><div>1948年底至1949年1月，超過一百萬名國軍部隊在國共戰爭中潰敗，共軍占領長江以北地區</div></div>
      <div class="pt"><div class="dot r"></div><div>1949年10月1日，中國共產黨宣布建立<em>中華人民共和國</em>，將北平改為北京；國民政府遷臺</div></div>

      <tr><td class="g">鎮壓反革命</td><td>掃蕩國民政府遺留的游擊隊、回鄉軍人、黑社會、地方宗教等</td><td>被害人數超過<em>二百萬人</em>以上</td></tr>

      <tr><td class="r">反右派鬥爭</td><td>1957年毛澤東號召知識界「大鳴大放」批評共黨，隨即秋後算帳</td><td>大批曾公開批評者被指為「右派知識分子」，遭調查、批判、降職、迫害甚至關押</td></tr>
      <tr><td class="r">大躍進</td><td>1957年提出「超英趕美」，要求鋼鐵與糧食產量隔年翻倍；動員全民大煉鋼、成立<em>人民公社</em></td><td>各公社自誇農業產量大幅增長，政府徵收糧食出口換外匯，轄區內糧食不足卻禁止災民外逃，造成1959–1961年<em>二至三千萬人死亡</em></td></tr>
      <tr><td class="r">文化大革命</td><td>大躍進失敗後毛澤東失去權力；1966年鼓動紅衛兵推翻劉少奇與鄧小平；破四舊（舊思想、舊文化、舊風俗、舊習慣）；知識分子下放勞改，教育倒退</td><td>黨政領導官員在政治運動中被認定為「反革命」，許多中共元老被鬥爭致死，也包括劉少奇</td></tr>

    <div class="sub-title">（五）鄧小平時代——改革開放來臨</div>

      <div class="pt"><div class="dot c"></div><div>政治、經濟改革：向國外資本主義取經，釋為「<em>具有中國特色的社會主義</em>」；廢除人民公社制度；建立<em>經濟特區</em>吸引外資；改革國營企業體制</div></div>
      <div class="pt"><div class="dot c"></div><div>保守政治：堅持共產黨領導、抗拒政治改革、元老干政</div></div>

    <div class="eg"><span class="eg-label">六四天安門事件（1989）</span>原因：1980年代改革開放造成物價飛漲、官員貪污，引起民怨 → 1989年爆發以政治民主化為訴求的全國性學生運動 → 鄧小平強硬鎮壓，6月4日在北京天安門廣場<em>血腥鎮壓</em> → 結果：江澤民被指定為新任總書記；西方國家對中共進行聯合經濟制裁 → 1992年鄧小平再強調經濟發展重要性，江澤民持續改革開放，推行大國外交</div>

      <div class="pt"><div class="dot r"></div><div>傷亡人數：近<em>三百萬人</em>喪生，一千萬個家庭離散</div></div>

  <div class="checklist-card">

<div class="card hl">
  <div class="pts">

  <div class="sec-title"><span class="num">二</span><h2>日本應變圖強</h2></div>

'c-juk': '\n<div class="note-header-block">\n  <div class="nh-tag">CHINESE LITERATURE ／ 段考範圍</div>\n  <h1>CH.4\u3000台灣古典詩文選</h1>\n  <div class="nh-sub">（一）畫菊自序・（二）誓志其二</div>\n</div>\n\n<div class="cn-art-hdr">\n  <span class="cn-art-badge">篇一</span>\n  <span class="cn-art-h2">畫菊自序</span>\n  <span class="cn-art-author">◎ 張李德和</span>\n</div>\n\n<div class="sec-title"><span class="num">作者</span><h2 style="color:var(--gold)">張李德和</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>清末至日治時期台灣女詩人、畫家，嘉義人</div></div>\n    <div class="pt"><div class="dot"></div><div>出身書香門第，<em>飽讀詩書</em>，以詩書之藝發揮才情</div></div>\n    <div class="pt"><div class="dot"></div><div>不屈於「<em>女子無才便是德</em>」的傳統觀念，精進自我</div></div>\n    <div class="pt"><div class="dot c"></div><div>著有《琳瑯山閣詩文集》，提倡女性文學教育</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num">題解</span><h2 style="color:var(--gold)">本文重點</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>文體：<em>序文（自序）</em>，為自己畫菊詩文集所寫的前言</div></div>\n    <div class="pt"><div class="dot"></div><div>主旨：<em>以畫菊自述志向</em>，追求詩畫成就，開展才華</div></div>\n    <div class="pt"><div class="dot c"></div><div>借李白（追隨李白才情）、管夫人（管道昇留芳千古）為標竿，表明自己畫作之意向</div></div>\n    <div class="pt"><div class="dot r"></div><div>期望：留住秋菊的<em>高潔風姿</em>，更期待彰顯高潔的風範</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num">翻譯</span><h2 style="color:var(--gold)">原文逐段翻譯</h2></div>\n<div class="card hl">\n  <table>\n    <tr><th>原文</th><th>白話翻譯</th></tr>\n    <tr>\n      <td style="color:#c8c0a0;width:42%;vertical-align:top;font-size:13px;">本文選自張李德和詩文集，自述作畫之旨趣，志在追求詩畫成就，以畫菊流傳高風亮節。</td>\n      <td>本文是她自述作畫旨趣的文章，志在追求詩畫上的成就，以畫菊的方式傳揚高尚的節操。</td>\n    </tr>\n    <tr>\n      <td style="color:var(--gold);width:42%;vertical-align:top;font-size:13px;">夫教子之餘，追隨李白，深切仰慕管夫人留芳千古的情，表明自己畫作不僅留住秋菊的風姿，更期待彰顯高潔的風範。</td>\n      <td>在教導子女之餘，心嚮往李白的才情，深仰慕管夫人（管道昇）能留芳千古的精神，表明自己的畫作不只留住秋菊的姿態，更希望彰顯高潔的風範。</td>\n    </tr>\n    <tr>\n      <td style="color:#c8c0a0;width:42%;vertical-align:top;font-size:13px;">作者不屈於「女子無才便是德」的傳統觀念，希望飽讀詩書，以詩畫之藝發揮才情，精進自我。</td>\n      <td>作者不甘屈服於傳統觀念，希望藉由詩歌和繪畫的技藝發揮才情，不斷精進自我。文中大量引用典故，對仗工整的駢句，展現了典雅的文字風格與深厚的文化素養。</td>\n    </tr>\n  </table>\n</div>\n\n<div class="sec-title"><span class="num">寫法</span><h2 style="color:var(--gold)">藝術特色</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div><em>用典</em>：引李白追求詩才、管夫人（管道昇）留芳千古，作為自我期許的標竿</div></div>\n    <div class="pt"><div class="dot"></div><div><em>駢句對仗</em>：句式工整，呈現典雅文字風格與深厚文化素養</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>菊的象徵</b>：秋菊 = <em>高潔、堅貞</em>的人格象徵，以物言志</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>序文結構</b>：先言旨趣 → 再舉例（典故）→ 最後表明志向</div></div>\n  </div>\n  <div class="cn-tip-y" style="margin-top:10px;">💡 <strong>以物言志</strong>：以「畫菊」比附自己追求高潔、不屈傳統的精神，菊＝作者的人格投射</div>\n</div>\n\n<hr>\n\n<div class="cn-art-hdr">\n  <span class="cn-art-badge c">篇二</span>\n  <span class="cn-art-h2 c">誓志其二</span>\n  <span class="cn-art-author">◎ 蔡旨禪</span>\n</div>\n\n<div class="sec-title"><span class="num" style="border-color:var(--cyan);color:var(--cyan);">作者</span><h2 style="color:var(--cyan)">蔡旨禪</h2></div>\n<div class="card" style="border-color:var(--cyan);">\n  <div class="pts">\n    <div class="pt"><div class="dot c"></div><div>台灣第一位<em>女塾師</em>（女老師），新竹人，約生於 1881 年</div></div>\n    <div class="pt"><div class="dot c"></div><div>投身<em>教育事業</em>，自主規劃人生，獨立生活</div></div>\n    <div class="pt"><div class="dot c"></div><div>生活的時代背景：<b>嚴格社會和文化限制女性</b>的時代（日治初期）</div></div>\n    <div class="pt"><div class="dot r"></div><div>《誓志》共兩首，本課選第二首，約作於 <em>1900 年</em></div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="border-color:var(--cyan);color:var(--cyan);">題解</span><h2 style="color:var(--cyan)">本詩重點</h2></div>\n<div class="card" style="border-color:var(--cyan);">\n  <div class="pts">\n    <div class="pt"><div class="dot c"></div><div>文體：<b>七言絕句</b>（七言、四句、共二十八字）</div></div>\n    <div class="pt"><div class="dot c"></div><div>主旨：表達<em>不依賴婚姻家庭</em>，以獨立之力投身教育，實踐自我</div></div>\n    <div class="pt"><div class="dot c"></div><div>核心精神：欲擺脫傳統對女性的束縛，<em>以一己之力充實自我</em>，擁有獨立的人生</div></div>\n    <div class="pt"><div class="dot r"></div><div>展現新穎奮進的思想、堅定自信的心志，<em>對傳統性別框架的勇敢突破</em></div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="border-color:var(--cyan);color:var(--cyan);">語意</span><h2 style="color:var(--cyan)">核心句意分析</h2></div>\n<div class="card" style="border-color:var(--cyan);">\n  <div class="pts">\n    <div class="pt"><div class="dot c"></div><div><b>「刻板印象」句</b>：點出時代困境，女性被要求只能依賴婚姻家庭</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>「充實自我」句</b>：宣示以一己之力實踐教育志業，奉養雙親</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>「擺脫框架」句</b>：明確表示欲脫離傳統對女性的期許與限制</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>「獨立人生」句</b>：展現新女性思想，以傳統七言絕句包裝現代進步觀念</div></div>\n  </div>\n  <div class="cn-tip-c" style="margin-top:8px;">⚠️ 詩句原文請對照課本填入，考試會考<em>每句白話翻譯</em>，建議直接背課本的翻譯版本。</div>\n</div>\n\n<div class="sec-title"><span class="num" style="border-color:var(--cyan);color:var(--cyan);">寫法</span><h2 style="color:var(--cyan)">藝術特色</h2></div>\n<div class="card" style="border-color:var(--cyan);">\n  <div class="pts">\n    <div class="pt"><div class="dot c"></div><div><b>淺白語言</b>：不用艱澀詞彙，直接表達志向，語言明確有力</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>以傳統體裁表現新思想</b>：七言絕句（傳統形式）包裝女性獨立意識（現代精神）</div></div>\n    <div class="pt"><div class="dot r"></div><div>對比：<em>刻板印象（社會對女性期待）vs. 自我期許（詩人的志向）</em></div></div>\n  </div>\n  <div class="cn-tip-c" style="margin-top:8px;">💡 核心張力：傳統文學形式 ✕ 突破性別框架的現代意識 → 這就是本詩的文學價值所在</div>\n</div>\n\n<hr>\n\n<div class="sec-title"><span class="num">比較</span><h2 style="color:var(--gold)">兩篇對照一覽</h2></div>\n<div class="cn-cmp">\n  <div class="cn-cmp-g">\n    <div class="cn-cmp-title">畫菊自序</div>\n    <div class="pts">\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>作者</em>：張李德和</div></div>\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>文體</em>：序文（散文）</div></div>\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>主旨</em>：以畫菊自述志向</div></div>\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>手法</em>：用典＋駢句對仗</div></div>\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>象徵</em>：菊＝高潔、堅貞</div></div>\n    </div>\n  </div>\n  <div class="cn-cmp-c">\n    <div class="cn-cmp-title">誓志其二</div>\n    <div class="pts">\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>作者</b>：蔡旨禪</div></div>\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>文體</b>：七言絕句（詩歌）</div></div>\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>主旨</b>：宣示女性獨立，投身教育</div></div>\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>手法</b>：淺白語言＋傳統體裁</div></div>\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>精神</b>：突破性別框架，自主人生</div></div>\n    </div>\n  </div>\n</div>\n<div class="cn-tip-y">🔑 <strong>共同點</strong>：兩位都是台灣女性文人，都在傳統束縛中<em>以文學表達自我意志</em>，都展現了對「女子無才便是德」觀念的反抗。</div>\n\n<hr>\n\n<div class="sec-title"><span class="num">考點</span><h2 style="color:var(--gold)">段考必背清單</h2></div>\n<div class="cn-exam">\n  <div class="cn-exam-title">⚡ HIGH PRIORITY ITEMS</div>\n  <div class="pts">\n    <div class="pt"><div class="dot r"></div><div>張李德和不屈於「<em>女子無才便是德</em>」→ 考最多！</div></div>\n    <div class="pt"><div class="dot r"></div><div>菊的象徵意義：<em>高潔、堅貞</em>，以物言志</div></div>\n    <div class="pt"><div class="dot r"></div><div>畫菊自序文體：<em>序文（自序）</em>，非詩非論</div></div>\n    <div class="pt"><div class="dot r"></div><div>誓志文體：<em>七言絕句</em>（四句、每句七字）</div></div>\n    <div class="pt"><div class="dot r"></div><div>蔡旨禪：台灣<em>第一位女塾師</em>，投身教育</div></div>\n    <div class="pt"><div class="dot r"></div><div>誓志核心：<em>不依賴婚姻家庭</em>，以一己之力充實自我</div></div>\n    <div class="pt"><div class="dot r"></div><div>兩篇共同精神：<em>反抗傳統性別束縛、追求自我實現</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>用典：李白、<em>管夫人（管道昇）</em> → 畫菊自序的標竿人物</div></div>\n  </div>\n</div>\n<div class="cn-chips">\n  <span class="cn-chip">張李德和</span>\n  <span class="cn-chip">蔡旨禪</span>\n  <span class="cn-chip">序文</span>\n  <span class="cn-chip">七言絕句</span>\n  <span class="cn-chip">以物言志</span>\n  <span class="cn-chip">用典</span>\n  <span class="cn-chip c">女塾師</span>\n  <span class="cn-chip c">性別框架</span>\n  <span class="cn-chip c">女性獨立</span>\n  <span class="cn-chip c">管道昇</span>\n</div>\n',
'c-shi': '\n<div class="note-header-block">\n  <div class="nh-tag">CHINESE LITERATURE ／ 段考範圍</div>\n  <h1>CH.4\u3000台灣古典詩文選</h1>\n  <div class="nh-sub">（一）畫菊自序・（二）誓志其二</div>\n</div>\n\n<div class="cn-art-hdr">\n  <span class="cn-art-badge">篇一</span>\n  <span class="cn-art-h2">畫菊自序</span>\n  <span class="cn-art-author">◎ 張李德和</span>\n</div>\n\n<div class="sec-title"><span class="num">作者</span><h2 style="color:var(--gold)">張李德和</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>清末至日治時期台灣女詩人、畫家，嘉義人</div></div>\n    <div class="pt"><div class="dot"></div><div>出身書香門第，<em>飽讀詩書</em>，以詩書之藝發揮才情</div></div>\n    <div class="pt"><div class="dot"></div><div>不屈於「<em>女子無才便是德</em>」的傳統觀念，精進自我</div></div>\n    <div class="pt"><div class="dot c"></div><div>著有《琳瑯山閣詩文集》，提倡女性文學教育</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num">題解</span><h2 style="color:var(--gold)">本文重點</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div>文體：<em>序文（自序）</em>，為自己畫菊詩文集所寫的前言</div></div>\n    <div class="pt"><div class="dot"></div><div>主旨：<em>以畫菊自述志向</em>，追求詩畫成就，開展才華</div></div>\n    <div class="pt"><div class="dot c"></div><div>借李白（追隨李白才情）、管夫人（管道昇留芳千古）為標竿，表明自己畫作之意向</div></div>\n    <div class="pt"><div class="dot r"></div><div>期望：留住秋菊的<em>高潔風姿</em>，更期待彰顯高潔的風範</div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num">翻譯</span><h2 style="color:var(--gold)">原文逐段翻譯</h2></div>\n<div class="card hl">\n  <table>\n    <tr><th>原文</th><th>白話翻譯</th></tr>\n    <tr>\n      <td style="color:#c8c0a0;width:42%;vertical-align:top;font-size:13px;">本文選自張李德和詩文集，自述作畫之旨趣，志在追求詩畫成就，以畫菊流傳高風亮節。</td>\n      <td>本文是她自述作畫旨趣的文章，志在追求詩畫上的成就，以畫菊的方式傳揚高尚的節操。</td>\n    </tr>\n    <tr>\n      <td style="color:var(--gold);width:42%;vertical-align:top;font-size:13px;">夫教子之餘，追隨李白，深切仰慕管夫人留芳千古的情，表明自己畫作不僅留住秋菊的風姿，更期待彰顯高潔的風範。</td>\n      <td>在教導子女之餘，心嚮往李白的才情，深仰慕管夫人（管道昇）能留芳千古的精神，表明自己的畫作不只留住秋菊的姿態，更希望彰顯高潔的風範。</td>\n    </tr>\n    <tr>\n      <td style="color:#c8c0a0;width:42%;vertical-align:top;font-size:13px;">作者不屈於「女子無才便是德」的傳統觀念，希望飽讀詩書，以詩畫之藝發揮才情，精進自我。</td>\n      <td>作者不甘屈服於傳統觀念，希望藉由詩歌和繪畫的技藝發揮才情，不斷精進自我。文中大量引用典故，對仗工整的駢句，展現了典雅的文字風格與深厚的文化素養。</td>\n    </tr>\n  </table>\n</div>\n\n<div class="sec-title"><span class="num">寫法</span><h2 style="color:var(--gold)">藝術特色</h2></div>\n<div class="card hl">\n  <div class="pts">\n    <div class="pt"><div class="dot"></div><div><em>用典</em>：引李白追求詩才、管夫人（管道昇）留芳千古，作為自我期許的標竿</div></div>\n    <div class="pt"><div class="dot"></div><div><em>駢句對仗</em>：句式工整，呈現典雅文字風格與深厚文化素養</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>菊的象徵</b>：秋菊 = <em>高潔、堅貞</em>的人格象徵，以物言志</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>序文結構</b>：先言旨趣 → 再舉例（典故）→ 最後表明志向</div></div>\n  </div>\n  <div class="cn-tip-y" style="margin-top:10px;">💡 <strong>以物言志</strong>：以「畫菊」比附自己追求高潔、不屈傳統的精神，菊＝作者的人格投射</div>\n</div>\n\n<hr>\n\n<div class="cn-art-hdr">\n  <span class="cn-art-badge c">篇二</span>\n  <span class="cn-art-h2 c">誓志其二</span>\n  <span class="cn-art-author">◎ 蔡旨禪</span>\n</div>\n\n<div class="sec-title"><span class="num" style="border-color:var(--cyan);color:var(--cyan);">作者</span><h2 style="color:var(--cyan)">蔡旨禪</h2></div>\n<div class="card" style="border-color:var(--cyan);">\n  <div class="pts">\n    <div class="pt"><div class="dot c"></div><div>台灣第一位<em>女塾師</em>（女老師），新竹人，約生於 1881 年</div></div>\n    <div class="pt"><div class="dot c"></div><div>投身<em>教育事業</em>，自主規劃人生，獨立生活</div></div>\n    <div class="pt"><div class="dot c"></div><div>生活的時代背景：<b>嚴格社會和文化限制女性</b>的時代（日治初期）</div></div>\n    <div class="pt"><div class="dot r"></div><div>《誓志》共兩首，本課選第二首，約作於 <em>1900 年</em></div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="border-color:var(--cyan);color:var(--cyan);">題解</span><h2 style="color:var(--cyan)">本詩重點</h2></div>\n<div class="card" style="border-color:var(--cyan);">\n  <div class="pts">\n    <div class="pt"><div class="dot c"></div><div>文體：<b>七言絕句</b>（七言、四句、共二十八字）</div></div>\n    <div class="pt"><div class="dot c"></div><div>主旨：表達<em>不依賴婚姻家庭</em>，以獨立之力投身教育，實踐自我</div></div>\n    <div class="pt"><div class="dot c"></div><div>核心精神：欲擺脫傳統對女性的束縛，<em>以一己之力充實自我</em>，擁有獨立的人生</div></div>\n    <div class="pt"><div class="dot r"></div><div>展現新穎奮進的思想、堅定自信的心志，<em>對傳統性別框架的勇敢突破</em></div></div>\n  </div>\n</div>\n\n<div class="sec-title"><span class="num" style="border-color:var(--cyan);color:var(--cyan);">語意</span><h2 style="color:var(--cyan)">核心句意分析</h2></div>\n<div class="card" style="border-color:var(--cyan);">\n  <div class="pts">\n    <div class="pt"><div class="dot c"></div><div><b>「刻板印象」句</b>：點出時代困境，女性被要求只能依賴婚姻家庭</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>「充實自我」句</b>：宣示以一己之力實踐教育志業，奉養雙親</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>「擺脫框架」句</b>：明確表示欲脫離傳統對女性的期許與限制</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>「獨立人生」句</b>：展現新女性思想，以傳統七言絕句包裝現代進步觀念</div></div>\n  </div>\n  <div class="cn-tip-c" style="margin-top:8px;">⚠️ 詩句原文請對照課本填入，考試會考<em>每句白話翻譯</em>，建議直接背課本的翻譯版本。</div>\n</div>\n\n<div class="sec-title"><span class="num" style="border-color:var(--cyan);color:var(--cyan);">寫法</span><h2 style="color:var(--cyan)">藝術特色</h2></div>\n<div class="card" style="border-color:var(--cyan);">\n  <div class="pts">\n    <div class="pt"><div class="dot c"></div><div><b>淺白語言</b>：不用艱澀詞彙，直接表達志向，語言明確有力</div></div>\n    <div class="pt"><div class="dot c"></div><div><b>以傳統體裁表現新思想</b>：七言絕句（傳統形式）包裝女性獨立意識（現代精神）</div></div>\n    <div class="pt"><div class="dot r"></div><div>對比：<em>刻板印象（社會對女性期待）vs. 自我期許（詩人的志向）</em></div></div>\n  </div>\n  <div class="cn-tip-c" style="margin-top:8px;">💡 核心張力：傳統文學形式 ✕ 突破性別框架的現代意識 → 這就是本詩的文學價值所在</div>\n</div>\n\n<hr>\n\n<div class="sec-title"><span class="num">比較</span><h2 style="color:var(--gold)">兩篇對照一覽</h2></div>\n<div class="cn-cmp">\n  <div class="cn-cmp-g">\n    <div class="cn-cmp-title">畫菊自序</div>\n    <div class="pts">\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>作者</em>：張李德和</div></div>\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>文體</em>：序文（散文）</div></div>\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>主旨</em>：以畫菊自述志向</div></div>\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>手法</em>：用典＋駢句對仗</div></div>\n      <div class="pt"><div class="dot" style="margin-top:6px;"></div><div style="font-size:13px;"><em>象徵</em>：菊＝高潔、堅貞</div></div>\n    </div>\n  </div>\n  <div class="cn-cmp-c">\n    <div class="cn-cmp-title">誓志其二</div>\n    <div class="pts">\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>作者</b>：蔡旨禪</div></div>\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>文體</b>：七言絕句（詩歌）</div></div>\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>主旨</b>：宣示女性獨立，投身教育</div></div>\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>手法</b>：淺白語言＋傳統體裁</div></div>\n      <div class="pt"><div class="dot c" style="margin-top:6px;"></div><div style="font-size:13px;"><b>精神</b>：突破性別框架，自主人生</div></div>\n    </div>\n  </div>\n</div>\n<div class="cn-tip-y">🔑 <strong>共同點</strong>：兩位都是台灣女性文人，都在傳統束縛中<em>以文學表達自我意志</em>，都展現了對「女子無才便是德」觀念的反抗。</div>\n\n<hr>\n\n<div class="sec-title"><span class="num">考點</span><h2 style="color:var(--gold)">段考必背清單</h2></div>\n<div class="cn-exam">\n  <div class="cn-exam-title">⚡ HIGH PRIORITY ITEMS</div>\n  <div class="pts">\n    <div class="pt"><div class="dot r"></div><div>張李德和不屈於「<em>女子無才便是德</em>」→ 考最多！</div></div>\n    <div class="pt"><div class="dot r"></div><div>菊的象徵意義：<em>高潔、堅貞</em>，以物言志</div></div>\n    <div class="pt"><div class="dot r"></div><div>畫菊自序文體：<em>序文（自序）</em>，非詩非論</div></div>\n    <div class="pt"><div class="dot r"></div><div>誓志文體：<em>七言絕句</em>（四句、每句七字）</div></div>\n    <div class="pt"><div class="dot r"></div><div>蔡旨禪：台灣<em>第一位女塾師</em>，投身教育</div></div>\n    <div class="pt"><div class="dot r"></div><div>誓志核心：<em>不依賴婚姻家庭</em>，以一己之力充實自我</div></div>\n    <div class="pt"><div class="dot r"></div><div>兩篇共同精神：<em>反抗傳統性別束縛、追求自我實現</em></div></div>\n    <div class="pt"><div class="dot r"></div><div>用典：李白、<em>管夫人（管道昇）</em> → 畫菊自序的標竿人物</div></div>\n  </div>\n</div>\n<div class="cn-chips">\n  <span class="cn-chip">張李德和</span>\n  <span class="cn-chip">蔡旨禪</span>\n  <span class="cn-chip">序文</span>\n  <span class="cn-chip">七言絕句</span>\n  <span class="cn-chip">以物言志</span>\n  <span class="cn-chip">用典</span>\n  <span class="cn-chip c">女塾師</span>\n  <span class="cn-chip c">性別框架</span>\n  <span class="cn-chip c">女性獨立</span>\n  <span class="cn-chip c">管道昇</span>\n</div>\n',

ss="zh">adv. 顯著地</td></tr>\n<tr><td class="w">network</td><td class="zh">n. 關係網；聯絡網</td></tr>\n<tr><td class="w">heal</td><td class="zh">v. （情感）康復，修復</td></tr>\n<tr><td class="w">process</td><td class="zh">v. 消化，處理，排解</td></tr>\n</table></div>\n<div class="card mag-card-s"><table class="vtbl"><tr><th class="s">字彙小補帖</th><th class="s">中文</th></tr>\n<tr><td class="w sm">overwhelm</td><td class="zh sm">v. 難以承受（overwhelming adj. 難以承受的）</td></tr>\n<tr><td class="w sm">trauma</td><td class="zh sm">n. 心理創傷（traumatic adj. 造成創傷的）</td></tr>\n<tr><td class="w sm">disorder</td><td class="zh sm">n. 障礙；失調；病</td></tr>\n<tr><td class="w sm">trigger</td><td class="zh sm">v. 觸發</td></tr>\n<tr><td class="w sm">flashback</td><td class="zh sm">n. 痛苦往事的重現，再現</td></tr>\n<tr><td class="w sm">empathy</td><td class="zh sm">n. 同理心</td></tr>\n<tr><td class="w sm">profession</td><td class="zh sm">n. 職業（professional adj. 專業的）</td></tr>\n<tr><td class="w sm">recovery</td><td class="zh sm">n. 恢復；康復</td></tr>\n<tr><td class="w sm">specialist</td><td class="zh sm">n. 專科醫生；專家</td></tr>\n<tr><td class="w sm">therapy</td><td class="zh sm">n. 心理治療</td></tr>\n<tr><td class="w sm">resilience</td><td class="zh sm">n. 適應力，復原力</td></tr>\n</table></div>\n<div class="card mag-card-c"><table class="vtbl"><tr><th class="c">PHRASE</th><th class="c">中文</th></tr>\n<tr><td class="w ph">shut (sth) down</td><td class="zh">關閉…；使…停止運轉</td></tr>\n<tr><td class="w ph">as though</td><td class="zh">好像；似乎</td></tr>\n<tr><td class="w ph">around the corner</td><td class="zh">即將來臨；在附近</td></tr>\n<tr><td class="w ph">tend to V</td><td class="zh">傾向於…；往往會…</td></tr>\n<tr><td class="w ph">once more</td><td class="zh">重新</td></tr>\n<tr><td class="w ph">play a role (in sth)</td><td class="zh">扮演某種角色/起某種作用</td></tr>\n</table></div>\n</div>\n\n<div class="mag-unit">\n<div class="mag-unit-hdr">UNIT 12</div>\n<div class="mag-unit-title">Why Do I Sound like That? The Science of Voice Confrontation</div>\n<div class="card hl"><table class="vtbl"><tr><th class="g">WORD</th><th class="g">中文</th></tr>\n<tr><td class="w">variety</td><td class="zh">n. 種類；各式各樣（a variety of sth）</td></tr>\n<tr><td class="w">physical</td><td class="zh">adj. 生理的；身體的</td></tr>\n<tr><td class="w">structure</td><td class="zh">n. 結構；構造</td></tr>\n<tr><td class="w">grasp</td><td class="zh">v. 理解；領會</td></tr>\n<tr><td class="w">inner</td><td class="zh">adj. 內部的（inner ear n. 內耳）</td></tr>\n<tr><td class="w">audio</td><td class="zh">n. 聲音</td></tr>\n<tr><td class="w">accurate</td><td class="zh">adj. 準確的；正確無誤的</td></tr>\n<tr><td class="w">dislike</td><td class="zh">n. 不喜歡；厭惡</td></tr>\n<tr><td class="w">gap</td><td class="zh">n. 差距（a gap between A and B）</td></tr>\n<tr><td class="w">confidence</td><td class="zh">n. 自信心</td></tr>\n<tr><td class="w">flexible</td><td class="zh">adj. 可變通的；靈活的</td></tr>\n<tr><td class="w">familiar</td><td class="zh">adj. 熟悉的（unfamiliar adj. 不熟悉的）</td></tr>\n</table></div>\n<div class="card mag-card-s"><table class="vtbl"><tr><th class="s">字彙小補帖</th><th class="s">中文</th></tr>\n<tr><td class="w sm">conduction</td><td class="zh sm">n. 傳導</td></tr>\n<tr><td class="w sm">vibration</td><td class="zh sm">n. 振動</td></tr>\n<tr><td class="w sm">skull</td><td class="zh sm">n. 頭骨；顱骨</td></tr>\n<tr><td class="w sm">filter</td><td class="zh sm">n. 過濾器</td></tr>\n<tr><td class="w sm">frequency</td><td class="zh sm">n. 頻率</td></tr>\n<tr><td class="w sm">confrontation</td><td class="zh sm">n. 衝突；對立</td></tr>\n<tr><td class="w sm">cue</td><td class="zh sm">n. 提示；線索；暗示</td></tr>\n<tr><td class="w sm">subtle</td><td class="zh sm">adj. 微妙的；難以察覺的</td></tr>\n<tr><td class="w sm">adjust</td><td class="zh sm">v. 適應</td></tr>\n<tr><td class="w sm">version</td><td class="zh sm">n. 版本</td></tr>\n</table></div>\n<div class="card mag-card-c"><table class="vtbl"><tr><th class="c">PHRASE</th><th class="c">中文</th></tr>\n<tr><td class="w ph">to begin with</td><td class="zh">首先</td></tr>\n<tr><td class="w ph">(beV) based on sth</td><td class="zh">根據…</td></tr>\n<tr><td class="w ph">what\'s more</td><td class="zh">再者；而且</td></tr>\n<tr><td class="w ph">go away</td><td class="zh">消失</td></tr>\n</table></div>\n</div>\n',
