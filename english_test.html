<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>單字機 VOCAB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b0e; --s1:#131317; --s2:#1a1a20; --s3:#22222a;
    --bd:rgba(255,255,255,.06); --bd2:rgba(255,255,255,.11);
    --gold:#e8b44f; --gold2:#c4922e; --gold-dim:rgba(232,180,79,.14); --gold-bd:rgba(232,180,79,.4);
    --text:#ecedf1; --muted:#62626e; --good:#3fd68f; --bad:#f06a6a;
    --disp:"Space Grotesk","Noto Sans TC",system-ui,sans-serif;
    --sans:"Noto Sans TC",system-ui,sans-serif;
    --mono:"IBM Plex Mono",ui-monospace,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{min-height:100%}
  body{font-family:var(--sans);color:var(--text);min-height:100vh;display:flex;justify-content:center;
    -webkit-font-smoothing:antialiased;background:var(--bg);
    background-image:radial-gradient(ellipse 90vw 50vh at 50% -15%, rgba(232,180,79,.07), transparent);
    overflow-x:hidden;overflow-y:auto;}
  button{font-family:inherit;color:inherit}
  .app{width:100%;max-width:520px;padding:18px 16px 120px;position:relative}
  .screen{display:none;animation:rise .28s ease}
  .screen.on{display:block}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  /* back to notes */
  .back-to-notes{position:fixed;top:14px;left:14px;z-index:200;background:rgba(19,19,23,.92);
    border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:8px 13px;
    font-family:"IBM Plex Mono",monospace;font-size:11px;color:#e8b44f;letter-spacing:1px;
    text-decoration:none;backdrop-filter:blur(10px);display:flex;align-items:center;gap:6px;
    transition:border-color .15s;}
  .back-to-notes:hover{border-color:rgba(232,180,79,.4);}
  /* top */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-top:10px}
  .brand{display:flex;align-items:center;gap:11px}
  .brand .mark{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;
    background:linear-gradient(145deg,var(--gold),var(--gold2));
    font-family:var(--disp);font-weight:700;font-size:17px;color:#1a1206;
    box-shadow:0 3px 14px rgba(232,180,79,.3)}
  .brand .bt{line-height:1.15}
  .brand .bt b{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.3px;display:block}
  .brand .bt span{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2.5px}
  .iconrow{display:flex;gap:7px}
  .ibtn{width:38px;height:38px;border-radius:11px;border:1px solid var(--bd);background:var(--s1);
    font-size:15px;cursor:pointer;transition:.15s;display:grid;place-items:center}
  .ibtn:hover{border-color:var(--gold-bd);background:var(--s2)}
  .ibtn.on{border-color:var(--gold-bd);background:var(--gold-dim)}
  .lab{display:flex;align-items:baseline;justify-content:space-between;margin:22px 1px 9px}
  .lab h3{font-family:var(--disp);font-size:13px;font-weight:600;letter-spacing:.4px;color:var(--text)}
  .lab .act{font-family:var(--mono);font-size:10px;color:var(--muted);background:none;border:none;
    cursor:pointer;letter-spacing:.5px;padding:2px 4px}
  .lab .act:hover{color:var(--gold)}
  .segs{display:flex;gap:4px;background:var(--s1);border:1px solid var(--bd);padding:4px;border-radius:13px}
  .seg{flex:1;border:none;border-radius:9px;padding:10px 4px;background:transparent;cursor:pointer;
    transition:.18s;text-align:center}
  .seg b{font-family:var(--sans);font-weight:700;font-size:13.5px;color:var(--muted);display:block;transition:.18s}
  .seg small{font-family:var(--mono);font-size:9px;color:var(--muted);opacity:.6}
  .seg:hover b{color:var(--text)}
  .seg.on{background:var(--s3);box-shadow:inset 0 0 0 1px var(--gold-bd)}
  .seg.on b{color:var(--gold)}
  .lessons{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}
  .chip{position:relative;border:1px solid var(--bd);border-radius:12px;padding:11px 11px 10px;
    background:var(--s1);cursor:pointer;transition:.15s;text-align:left}
  .chip:hover{border-color:var(--bd2);background:var(--s2)}
  .chip:active{transform:scale(.97)}
  .chip.sel{border-color:var(--gold-bd);background:linear-gradient(160deg,var(--gold-dim),var(--s1) 75%)}
  .chip.empty{opacity:.3;cursor:not-allowed}
  .chip .tk{position:absolute;top:8px;right:9px;width:15px;height:15px;border-radius:5px;
    border:1.5px solid var(--bd2);transition:.15s;display:grid;place-items:center;
    font-size:9px;color:transparent}
  .chip.sel .tk{background:var(--gold);border-color:var(--gold);color:#1a1206;font-weight:900}
  .chip .ttl{font-family:var(--disp);font-weight:600;font-size:13.5px}
  .chip .ct{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:3px}
  .chip .ct .due{color:var(--bad)}
  .chip .bar{height:2.5px;border-radius:99px;background:rgba(255,255,255,.06);margin-top:8px;overflow:hidden}
  .chip .bar i{display:block;height:100%;border-radius:99px;background:var(--gold);transition:width .3s}
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:7px}
  .mode{display:flex;align-items:center;gap:11px;border:1px solid var(--bd);border-radius:13px;
    padding:13px 14px;background:var(--s1);cursor:pointer;transition:.15s;text-align:left}
  .mode:hover{border-color:var(--bd2);background:var(--s2)}
  .mode:active{transform:scale(.97)}
  .mode.on{border-color:var(--gold-bd);background:linear-gradient(160deg,var(--gold-dim),var(--s1) 80%)}
  .mode .mic{width:38px;height:38px;border-radius:10px;background:var(--s3);display:grid;place-items:center;
    font-size:18px;flex-shrink:0;transition:.15s}
  .mode.on .mic{background:var(--gold);box-shadow:0 2px 10px rgba(232,180,79,.35)}
  .mode .mt b{font-family:var(--sans);font-weight:700;font-size:14px;display:block}
  .mode .mt span{font-size:10.5px;color:var(--muted)}
  .panel{margin-top:14px;border:1px solid var(--bd);border-radius:14px;background:var(--s1);
    padding:14px 15px;display:none}
  .panel.open{display:block;animation:rise .22s ease}
  .panel h4{font-family:var(--disp);font-size:12px;font-weight:600;margin-bottom:10px;color:var(--gold);letter-spacing:.5px}
  .prow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .vsel{flex:1;min-width:130px;background:var(--s2);color:var(--text);border:1px solid var(--bd);
    border-radius:9px;padding:9px 11px;font-family:var(--sans);font-size:12.5px;outline:none;cursor:pointer}
  .vsel:focus{border-color:var(--gold-bd)}
  .tbtn{background:var(--s3);color:var(--gold);border:1px solid var(--bd);border-radius:9px;
    padding:9px 13px;font-size:12px;cursor:pointer;transition:.15s;font-family:var(--mono)}
  .tbtn:hover{border-color:var(--gold-bd)}
  .toggle{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--muted);cursor:pointer;
    width:100%;margin-top:9px}
  .toggle input{accent-color:var(--gold);width:15px;height:15px}
  .dock{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
    padding:12px 16px calc(14px + env(safe-area-inset-bottom));z-index:50;
    background:linear-gradient(180deg,transparent, var(--bg) 35%)}
  .dock-in{display:flex;align-items:center;gap:11px;background:var(--s2);border:1px solid var(--bd2);
    border-radius:16px;padding:9px 9px 9px 17px;box-shadow:0 -4px 30px rgba(0,0,0,.5)}
  .dock .ds{flex:1;line-height:1.3}
  .dock .ds b{font-family:var(--mono);font-size:13px;color:var(--gold);display:block}
  .dock .ds span{font-family:var(--mono);font-size:9.5px;color:var(--muted)}
  .gobtn{border:none;border-radius:11px;padding:14px 26px;cursor:pointer;transition:.15s;
    font-family:var(--disp);font-weight:700;font-size:15px;letter-spacing:.5px;
    background:linear-gradient(145deg,var(--gold),var(--gold2));color:#1a1206;
    box-shadow:0 4px 18px rgba(232,180,79,.35)}
  .gobtn:hover{filter:brightness(1.08);transform:translateY(-1px)}
  .gobtn:active{transform:translateY(0)}
  .gobtn:disabled{opacity:.3;cursor:not-allowed;box-shadow:none;filter:grayscale(.7);transform:none}
  .btn{width:100%;border:none;border-radius:13px;padding:15px;font-family:var(--disp);font-weight:700;
    font-size:15px;cursor:pointer;transition:.15s;margin-top:9px;
    background:linear-gradient(145deg,var(--gold),var(--gold2));color:#1a1206;
    box-shadow:0 4px 18px rgba(232,180,79,.3)}
  .btn:hover{filter:brightness(1.07);transform:translateY(-1px)}
  .btn.ghost{background:var(--s2);border:1px solid var(--bd);color:var(--text);box-shadow:none}
  .btn.ghost:hover{border-color:var(--bd2);background:var(--s3);filter:none}
  .sbar{display:flex;align-items:center;gap:11px;margin-bottom:14px}
  .backbtn{width:36px;height:36px;border-radius:10px;border:1px solid var(--bd);background:var(--s1);
    cursor:pointer;font-size:15px;color:var(--muted);transition:.15s;flex-shrink:0;display:grid;place-items:center}
  .backbtn:hover{color:var(--text);border-color:var(--bd2)}
  .sinfo{flex:1;min-width:0}
  .sinfo .dk{font-family:var(--disp);font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sinfo .cnt{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
  .streak{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--gold);
    background:var(--gold-dim);border:1px solid var(--gold-bd);padding:5px 11px;border-radius:99px;flex-shrink:0}
  .prog{height:4px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden;margin-bottom:20px}
  .prog i{display:block;height:100%;width:0;transition:width .35s;border-radius:99px;
    background:linear-gradient(90deg,var(--gold),#f5d589)}
  .flip{perspective:1500px;margin:0 0 14px}
  .flip-in{position:relative;width:100%;min-height:280px;
    transition:transform .5s cubic-bezier(.3,.1,.15,1);transform-style:preserve-3d;cursor:pointer}
  .flip.on .flip-in{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;
    border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:34px 26px;text-align:center;background:var(--s1);border:1px solid var(--bd2)}
  .face::before{content:"";position:absolute;top:0;left:18px;right:18px;height:2px;border-radius:99px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.7}
  .face.back{transform:rotateY(180deg);background:linear-gradient(170deg,#1c1813,var(--s1) 55%)}
  .word{font-family:var(--disp);font-size:36px;font-weight:700;letter-spacing:-.3px;line-height:1.18;overflow-wrap:anywhere}
  .word.zh{font-family:var(--sans);font-size:25px;font-weight:700;line-height:1.5}
  .whint{color:var(--muted);font-size:11px;margin-top:14px;font-family:var(--mono);letter-spacing:.5px}
  .spk{margin-top:18px;background:var(--s2);border:1px solid var(--bd2);color:var(--gold);
    width:46px;height:46px;border-radius:50%;font-size:17px;cursor:pointer;transition:.15s}
  .spk:hover{border-color:var(--gold-bd);background:var(--s3)}
  .fliphint{text-align:center;font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-bottom:11px;min-height:15px}
  .rate{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .rate button{border-radius:12px;padding:15px;font-family:var(--sans);font-weight:700;font-size:14.5px;
    cursor:pointer;transition:.14s;border:1px solid}
  .rate .no{background:rgba(240,106,106,.09);color:var(--bad);border-color:rgba(240,106,106,.25)}
  .rate .yes{background:rgba(63,214,143,.09);color:var(--good);border-color:rgba(63,214,143,.25)}
  .rate button:hover{transform:translateY(-1px);filter:brightness(1.12)}
  .rate button:active{transform:translateY(0)}
  .qword{text-align:center;margin:8px 0 20px}
  .qword .w{font-family:var(--disp);font-size:34px;font-weight:700;overflow-wrap:anywhere}
  .opts{display:grid;gap:8px}
  .opt{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 16px;
    font-size:15px;cursor:pointer;text-align:left;transition:.12s;color:var(--text)}
  .opt:hover{border-color:var(--bd2);background:var(--s2)}
  .opt:active{transform:scale(.98)}
  .opt.correct{border-color:var(--good);background:rgba(63,214,143,.1);color:var(--good)}
  .opt.wrong{border-color:var(--bad);background:rgba(240,106,106,.1);color:var(--bad);animation:shake .3s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .opt:disabled{cursor:default}
  .inp{width:100%;background:var(--s1);border:1px solid var(--bd2);border-radius:13px;
    padding:16px;font-size:19px;color:var(--text);font-family:var(--disp);text-align:center;
    outline:none;letter-spacing:.5px;transition:.15s}
  .inp:focus{border-color:var(--gold-bd);background:var(--s2)}
  .inp.ok{border-color:var(--good);color:var(--good)}
  .inp.err{border-color:var(--bad);color:var(--bad);animation:shake .3s}
  .ans{text-align:center;color:var(--muted);margin-top:11px;font-size:13px;min-height:20px;font-family:var(--mono)}
  .ans b{color:var(--good)}
  .result{text-align:center;padding-top:24px}
  .rpct{font-family:var(--disp);font-size:84px;font-weight:700;letter-spacing:-4px;line-height:1;
    background:linear-gradient(150deg,#f5d589,var(--gold) 50%,var(--gold2));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .rmsg{font-size:16px;margin:10px 0 26px;color:var(--muted)}
  .rstats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
  .rstat{background:var(--s1);border:1px solid var(--bd);border-radius:13px;padding:17px 6px}
  .rstat .n{font-family:var(--mono);font-size:23px;font-weight:600;line-height:1}
  .rstat .n.g{color:var(--good)}.rstat .n.b{color:var(--bad)}.rstat .n.a{color:var(--gold)}
  .rstat .t{font-size:9px;color:var(--muted);margin-top:6px;letter-spacing:1px;font-family:var(--mono)}
  .wrongbox{text-align:left;background:var(--s1);border:1px solid var(--bd);border-radius:14px;
    padding:15px 16px;margin-bottom:6px}
  .wrongbox h4{font-family:var(--disp);font-size:12px;color:var(--bad);letter-spacing:.5px;margin-bottom:10px}
  .wrow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:7px 0;
    border-bottom:1px solid var(--bd);font-size:13.5px}
  .wrow:last-child{border-bottom:none}
  .wrow .we{font-family:var(--disp);font-weight:600;color:var(--text)}
  .wrow .wz{color:var(--muted);font-size:12px;text-align:right}
  .hstats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:14px 0}
  .hs{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 4px;text-align:center}
  .hs .n{font-family:var(--mono);font-size:19px;font-weight:600;line-height:1}
  .hs .n.g{color:var(--good)}.hs .n.a{color:var(--gold)}.hs .n.b{color:var(--bad)}
  .hs .t{font-size:8.5px;color:var(--muted);margin-top:5px;letter-spacing:.5px;font-family:var(--mono)}
  .hchart-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:13px;margin-bottom:14px;padding:14px 14px 10px}
  .hchart{display:flex;align-items:flex-end;gap:4px;height:76px}
  .hbar{flex:1;min-width:4px;border-radius:3px 3px 0 0;
    background:linear-gradient(180deg,var(--gold),rgba(232,180,79,.25));transition:height .35s}
  .hcap{text-align:center;font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:9px}
  .hlist{display:flex;flex-direction:column;gap:6px}
  .hrow{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
    border:1px solid var(--bd);border-radius:12px;background:var(--s1)}
  .hrow .hdeck{font-family:var(--disp);font-weight:600;font-size:13px}
  .hrow .hmeta{font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px}
  .hrow .hr{text-align:right}
  .hrow .hpct{font-family:var(--mono);font-size:16px;font-weight:600}
  .hrow .hpct.g{color:var(--good)}.hrow .hpct.a{color:var(--gold)}.hrow .hpct.b{color:var(--bad)}
  .hempty{text-align:center;color:var(--muted);font-size:12px;padding:34px 10px;font-family:var(--mono);line-height:1.9}
</style>
</head>
<body>
<a class="back-to-notes" href="notes_mobile.html">← NOTE.SYS</a>
<div class="app">
  <div class="screen on" id="s-home">
    <div class="top">
      <div class="brand">
        <div class="mark">V</div>
        <div class="bt"><b>單字機</b><span>VOCAB DRILL</span></div>
      </div>
      <div class="iconrow">
        <button class="ibtn" id="histBtn" title="歷史數據">📊</button>
        <button class="ibtn" id="setBtn" title="發音設定">⚙️</button>
      </div>
    </div>
    <div class="lab"><h3>選擇冊別</h3></div>
    <div class="segs" id="tabs"></div>
    <div class="lab"><h3>選擇課程</h3><button class="act" id="allBtn">全選本冊</button></div>
    <div class="lessons" id="lessons"></div>
    <div class="lab"><h3>訓練模式</h3></div>
    <div class="modes">
      <button class="mode" data-mode="flip"><span class="mic">🃏</span><span class="mt"><b>翻卡</b><span>a–z 順序複習</span></span></button>
      <button class="mode" data-mode="choice"><span class="mic">🎯</span><span class="mt"><b>選擇題</b><span>四選一</span></span></button>
      <button class="mode" data-mode="spell"><span class="mic">⌨️</span><span class="mt"><b>拼字</b><span>看中文拼英文</span></span></button>
      <button class="mode" data-mode="listen"><span class="mic">🎧</span><span class="mt"><b>聽寫</b><span>聽發音拼字</span></span></button>
    </div>
    <div class="panel" id="setPanel">
      <h4>🔊 發音設定</h4>
      <div class="prow">
        <select class="vsel" id="voiceSel"><option>載入語音中…</option></select>
        <button class="tbtn" id="testV">試聽</button>
      </div>
      <label class="toggle"><input type="checkbox" id="onlineV"> 高音質語音（需連網，最自然）</label>
    </div>
  </div>
  <div class="screen" id="s-study">
    <div class="sbar">
      <button class="backbtn" id="quitBtn">←</button>
      <div class="sinfo"><div class="dk" id="deckBadge">—</div><div class="cnt" id="counter">1 / 10</div></div>
      <div class="streak" id="streak">🔥 0</div>
    </div>
    <div class="prog"><i id="progBar"></i></div>
    <div id="stage"></div>
  </div>
  <div class="screen" id="s-result">
    <div class="result">
      <div class="rpct" id="rScore">0%</div>
      <div class="rmsg" id="rMsg">訓練完成</div>
      <div class="rstats">
        <div class="rstat"><div class="n a" id="rTotal">0</div><div class="t">TOTAL</div></div>
        <div class="rstat"><div class="n g" id="rRight">0</div><div class="t">CORRECT</div></div>
        <div class="rstat"><div class="n b" id="rWrong">0</div><div class="t">MISSED</div></div>
      </div>
      <div id="wrongWrap"></div>
      <button class="btn" id="againBtn">再來一輪</button>
      <button class="btn ghost" id="homeBtn">回主畫面</button>
      <button class="btn ghost" id="resHist">📊 歷史數據</button>
    </div>
  </div>
  <div class="screen" id="s-history">
    <div class="sbar">
      <button class="backbtn" id="histBack">←</button>
      <div class="sinfo"><div class="dk">歷史數據</div><div class="cnt">HISTORY</div></div>
    </div>
    <div id="histBody"></div>
  </div>
</div>
<div class="dock" id="dock">

const VOCAB = {};
for(const cat in SCHEMA){
  VOCAB[cat] = {};
  SCHEMA[cat].forEach(l=>{ VOCAB[cat][l] = (SEED[cat] && SEED[cat][l]) || []; });
}

/* ============ 間隔重複（Leitner）+ 存檔 ============ */
const STORE_KEY="vocabsys_v2";
const INTERVALS=[0,1,2,4,8];
let progress=loadProgress();
function loadProgress(){ try{return JSON.parse(localStorage.getItem(STORE_KEY))||{};}catch(e){return {};} }
function saveProgress(){ try{localStorage.setItem(STORE_KEY,JSON.stringify(progress));}catch(e){} }
const keyOf=(c,l,w)=>c+"|"+l+"|"+w.en;
function rec(c,l,w){ const k=keyOf(c,l,w); if(!progress[k]) progress[k]={box:0,due:0}; return progress[k]; }
function isDue(c,l,w){ return rec(c,l,w).due<=Date.now(); }
function grade(c,l,w,ok){ const r=rec(c,l,w); r.box=ok?Math.min(r.box+1,INTERVALS.length-1):0; r.due=Date.now()+INTERVALS[r.box]*86400000; saveProgress(); }
function lessonStats(c,l){
  const list=VOCAB[c][l]; let m=0,d=0;
  list.forEach(w=>{ if(rec(c,l,w).box>=3)m++; if(isDue(c,l,w))d++; });
  return {total:list.length, mastered:m, due:d, pct:list.length?Math.round(m/list.length*100):0};
}

const HIST_KEY="vocabsys_hist_v1";
const MODE_NAMES={flip:"翻卡",choice:"選擇題",spell:"拼字",listen:"聽寫"};
function loadHist(){ try{return JSON.parse(localStorage.getItem(HIST_KEY))||[];}catch(e){return [];} }
function saveHist(h){ try{localStorage.setItem(HIST_KEY,JSON.stringify(h));}catch(e){} }
function pushHist(r){ const h=loadHist(); h.push(r); if(h.length>500)h.shift(); saveHist(h); }

      <div class="bar"><i style="width:${s.pct}%"></i></div>`;

/* ============ 工具 ============ */
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];} return a; }
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  document.getElementById('dock').style.display = (id==='s-home') ? "" : "none";
  window.scrollTo(0,0);

/* ============ 開始訓練 ============ */
function startSession(){
  const pool=selectedWords();
  let due=pool.filter(it=>isDue(it.c,it.l,it.w));
  if(due.length===0) due=[...pool];
  if(selMode==="flip"){
    queue=[...pool].sort((a,b)=>a.w.en.toLowerCase().localeCompare(b.w.en.toLowerCase())).map(it=>({...it,retry:false}));
  } else {
    queue=shuffle([...due]).map(it=>({...it, retry:false}));
  }
  qi=0; sStats={right:0,wrong:0,total:0}; streak=0; wrongList=[];
  document.getElementById('deckBadge').textContent =
    selected.size===1 ? [...selected][0].replace("|"," · ") : `${selected.size} 個單元`;
  show('s-study'); renderStage();
}

/* ============ 發音引擎 ============ */
let voices=[], chosenVoice=null, useOnline=false, savedVoiceName=null;
function loadVoicePrefs(){ try{ savedVoiceName=localStorage.getItem('vd_voice'); useOnline=localStorage.getItem('vd_online')==="1"; }catch(e){}
  const ob=document.getElementById('onlineV'); if(ob) ob.checked=useOnline; }
function voiceScore(v){ const n=(v.name||"").toLowerCase(); let s=0;
  if(/natural|neural|premium|enhanced|siri/.test(n)) s+=100;
  if(n.includes("google")) s+=80;
  if(/samantha|aria|jenny|guy|sonia|ava|libby|ryan|emma|nova/.test(n)) s+=60;
  if(v.lang){ if(v.lang.startsWith("en-US"))s+=20; else if(v.lang.startsWith("en-GB"))s+=15; else if(v.lang.startsWith("en"))s+=10; }
  if(v.localService===false) s+=5; return s; }
function populateVoices(){
  let all=(window.speechSynthesis?speechSynthesis.getVoices():[])||[];
  voices=all.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en")); if(voices.length===0) voices=all;
  voices.sort((a,b)=>voiceScore(b)-voiceScore(a));
  const sel=document.getElementById('voiceSel'); if(!sel) return;
  if(voices.length===0){ sel.innerHTML="<option>此瀏覽器無內建語音</option>"; return; }
  sel.innerHTML="";
  voices.forEach(v=>{ const o=document.createElement('option');
    const tag=v.lang.includes("GB")?"（英腔）":v.lang.includes("US")?"（美腔）":v.lang.includes("AU")?"（澳腔）":"";
    o.value=v.name; o.textContent=v.name.replace(/Microsoft|Google/g,"").trim()+" "+tag; sel.appendChild(o); });
  let pick = savedVoiceName ? voices.find(v=>v.name===savedVoiceName) : null;
  if(!pick) pick=voices[0]; chosenVoice=pick; sel.value=pick.name;
}
function initVoices(){
  loadVoicePrefs(); populateVoices();
  if(window.speechSynthesis) speechSynthesis.onvoiceschanged=populateVoices;
  const sel=document.getElementById('voiceSel');
  if(sel) sel.onchange=e=>{ chosenVoice=voices.find(v=>v.name===e.target.value)||null;
    try{localStorage.setItem('vd_voice',e.target.value);}catch(_){} speak("knowledge"); };
  const tv=document.getElementById('testV'); if(tv) tv.onclick=()=>speak("knowledge");
  const ov=document.getElementById('onlineV'); if(ov) ov.onchange=e=>{ useOnline=e.target.checked;
    try{localStorage.setItem('vd_online',useOnline?"1":"0");}catch(_){} speak("knowledge"); };
}
function speak(text){
  if(useOnline){
    try{ const url="https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=en&q="+encodeURIComponent(text);
      const a=new Audio(url); a.onerror=()=>sysSpeak(text); const p=a.play(); if(p&&p.catch)p.catch(()=>sysSpeak(text)); return;
    }catch(e){} }
  sysSpeak(text);
}
function sysSpeak(text){ try{ window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang=(chosenVoice&&chosenVoice.lang)||"en-US";
  if(chosenVoice) u.voice=chosenVoice; u.rate=.92; u.pitch=1; window.speechSynthesis.speak(u);
}catch(e){} }

/* ============ 題目渲染 ============ */
const stage=document.getElementById('stage');
function updHud(){
  document.getElementById('counter').textContent=`${Math.min(qi+1,queue.length)} / ${queue.length}`;
  document.getElementById('streak').textContent=`🔥 ${streak}`;
  document.getElementById('progBar').style.width=(qi/queue.length*100)+"%";
}
function renderStage(){
  if(qi>=queue.length) return finish();
  updHud();
  const w=queue[qi].w;
  if(selMode==="flip") return renderFlip(w);
  if(selMode==="choice") return renderChoice(w);
  if(selMode==="spell") return renderSpell(w,false);
  if(selMode==="listen") return renderSpell(w,true);
}

/* —— 翻卡（可來回翻）—— */
function renderFlip(w){
  stage.innerHTML=`
    <div class="flip" id="flip"><div class="flip-in" id="flipIn">
      <div class="face front"><div class="word">${w.en}</div>
        <button class="spk" id="spk">🔊</button><div class="whint">TAP — 看意思</div></div>
      <div class="face back"><div class="word zh">${w.zh}</div><div class="whint">${w.en}</div></div>
    </div></div>
    <div class="fliphint" id="fh">點卡片翻面</div>
    <div class="rate" id="rate" style="visibility:hidden"><button class="no">還不熟</button><button class="yes">記得 ✓</button></div>`;
  const flip=document.getElementById('flip');
  let flipped=false;
  document.getElementById('spk').onclick=e=>{e.stopPropagation();speak(w.en);};
  document.getElementById('flipIn').onclick=()=>{
    flipped=!flipped;
    flip.classList.toggle('on', flipped);
    document.getElementById('rate').style.visibility = flipped ? "visible" : "hidden";
    document.getElementById('fh').textContent = flipped ? "想起來了嗎？（再點可翻回）" : "點卡片翻面";
    if(flipped) speak(w.en);
  };
  document.querySelector('#rate .no').onclick=()=>answer(false);
  document.querySelector('#rate .yes').onclick=()=>answer(true);
}
function allWords(){ const o=[]; for(const c in VOCAB)for(const l in VOCAB[c])VOCAB[c][l].forEach(w=>o.push(w)); return o; }
function renderChoice(w){
  const pool=allWords().filter(x=>x.zh!==w.zh).map(x=>x.zh);
  const opts=shuffle([w.zh, ...shuffle(pool).slice(0,3)]);
  stage.innerHTML=`<div class="qword"><div class="w">${w.en}</div>
    <button class="spk" id="spk" style="margin-top:12px">🔊</button></div><div class="opts" id="opts"></div>`;
  document.getElementById('spk').onclick=()=>speak(w.en); speak(w.en);
  const box=document.getElementById('opts');
  opts.forEach(o=>{ const b=document.createElement('button'); b.className="opt"; b.textContent=o;
    b.onclick=()=>{ const ok=o===w.zh;
      box.querySelectorAll('.opt').forEach(x=>{ x.disabled=true; if(x.textContent===w.zh)x.classList.add('correct'); });
      if(!ok) b.classList.add('wrong'); setTimeout(()=>answer(ok), ok?450:1100); };
    box.appendChild(b); });
}
function renderSpell(w,listen){
  stage.innerHTML=`<div class="qword">${ listen
    ? `<button class="spk" id="spk" style="margin:0 auto 6px">🔊</button><div class="whint">聽發音，拼出單字</div>`
    : `<div class="w" style="font-size:26px;font-family:var(--sans);line-height:1.5">${w.zh}</div>` }</div>
    <input class="inp" id="inp" placeholder="輸入英文…" autocomplete="off" autocapitalize="off" spellcheck="false">
    <div class="ans" id="ans">　</div><button class="btn" id="check" style="margin-top:12px">確認</button>`;
  if(listen){ document.getElementById('spk').onclick=()=>speak(w.en); speak(w.en); }
  const inp=document.getElementById('inp'); inp.focus();
  const submit=()=>{ const val=inp.value.trim().toLowerCase(); if(!val)return;
    const ok=val===w.en.toLowerCase(); inp.disabled=true; document.getElementById('check').disabled=true;
    inp.classList.add(ok?"ok":"err"); document.getElementById('ans').innerHTML=ok?"答對 ✓":`正解：<b>${w.en}</b>`;
    speak(w.en); setTimeout(()=>answer(ok), ok?650:1400); };
  document.getElementById('check').onclick=submit;
  inp.onkeydown=e=>{ if(e.key==="Enter") submit(); };
}

/* ============ 作答 ============ */
function answer(ok){
  const it=queue[qi]; grade(it.c,it.l,it.w,ok); sStats.total++;
  if(ok){ sStats.right++; streak++; }
  else{
    sStats.wrong++; streak=0;
    if(!wrongList.some(x=>x.en===it.w.en)) wrongList.push(it.w);
    if(!it.retry) queue.push({...it,retry:true});
  }
  qi++; renderStage();
}

/* ============ 結算 ============ */
function finish(){
  document.getElementById('progBar').style.width="100%";
  const pct=sStats.total?Math.round(sStats.right/sStats.total*100):0;
  document.getElementById('rScore').textContent=pct+"%";
  document.getElementById('rTotal').textContent=sStats.total;
  document.getElementById('rRight').textContent=sStats.right;
  document.getElementById('rWrong').textContent=sStats.wrong;
  document.getElementById('rMsg').textContent =
    pct>=90?"完美！幾乎全對 🎯":pct>=70?"表現穩定 💪":pct>=50?"再跑幾輪會更熟 📈":"重複就會記住 🔁";
  // 錯字清單
  const ww=document.getElementById('wrongWrap');
  ww.innerHTML = wrongList.length ? `
    <div class="wrongbox"><h4>本輪答錯（${wrongList.length}）</h4>
      ${wrongList.map(w=>`<div class="wrow"><span class="we">${w.en}</span><span class="wz">${w.zh}</span></div>`).join("")}
    </div>` : "";
  if(sStats.total>0) pushHist({ ts:Date.now(), deck:document.getElementById('deckBadge').textContent,
    mode:MODE_NAMES[selMode]||selMode, total:sStats.total, right:sStats.right, wrong:sStats.wrong, pct });
  show('s-result'); renderLessons();
}

/* ============ 歷史數據渲染 ============ */
function fmtDate(ts){ const d=new Date(ts), p=n=>String(n).padStart(2,"0");
  return `${d.getMonth()+1}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
function renderHistory(){
  const all=loadHist();
  const h=all.slice().reverse();
  const sessions=all.length;
  const totalAns=all.reduce((s,r)=>s+r.total,0);
  const totalRight=all.reduce((s,r)=>s+r.right,0);
  const avg=totalAns?Math.round(totalRight/totalAns*100):0;
  const t0=new Date(); t0.setHours(0,0,0,0);
  const todayCount=all.filter(r=>r.ts>=t0.getTime()).length;
  const recent=all.slice(-20);
  const bars=recent.map(r=>`<div class="hbar" title="${fmtDate(r.ts)}｜${r.pct}%" style="height:${Math.max(r.pct,4)}%"></div>`).join("");
  const rows = h.length ? h.map(r=>`
    <div class="hrow">
      <div><div class="hdeck">${r.deck}</div><div class="hmeta">${fmtDate(r.ts)} · ${r.mode}</div></div>
      <div class="hr"><div class="hpct ${r.pct>=70?'g':r.pct>=50?'a':'b'}">${r.pct}%</div><div class="hmeta">${r.right}/${r.total} 對</div></div>
    </div>`).join("") : `<div class="hempty">還沒有訓練紀錄<br>去背幾輪，數據就會長出來 📈</div>`;
  document.getElementById('histBody').innerHTML=`
    <div class="hstats">
      <div class="hs"><div class="n a">${sessions}</div><div class="t">訓練次數</div></div>
      <div class="hs"><div class="n">${totalAns}</div><div class="t">累計作答</div></div>
      <div class="hs"><div class="n g">${avg}%</div><div class="t">平均正確率</div></div>
      <div class="hs"><div class="n a">${todayCount}</div><div class="t">今日次數</div></div>
    </div>
    ${recent.length?`<div class="hchart-wrap"><div class="hchart">${bars}</div><div class="hcap">近 ${recent.length} 輪正確率走勢</div></div>`:""}
    <div class="hlist">${rows}</div>
    ${all.length?`<button class="btn ghost" id="clrHist" style="margin-top:13px">🗑 清除所有紀錄</button>`:""}`;
  const clr=document.getElementById('clrHist');
  if(clr) clr.onclick=()=>{ if(confirm("確定清除所有訓練紀錄？此動作無法復原。")){ saveHist([]); renderHistory(); } };
}

/* ============ 導覽 ============ */
document.getElementById('quitBtn').onclick=()=>{ renderLessons(); show('s-home'); };
document.getElementById('againBtn').onclick=startSession;
document.getElementById('homeBtn').onclick=()=>{ renderLessons(); show('s-home'); };
document.getElementById('histBtn').onclick=()=>{ renderHistory(); show('s-history'); };
document.getElementById('resHist').onclick=()=>{ renderHistory(); show('s-history'); };
document.getElementById('histBack').onclick=()=>{ renderLessons(); show('s-home'); };

/* ============ init ============ */
renderTabs(); renderLessons(); refreshDock(); initVoices();
</script>
</body>
</html>
